<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Worship Tempo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 400px;
    text-align: center;
    padding: 24px 0 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
  }

  /* ── Pulse dot ── */
  .pulse-area {
    width: 100%;
    max-width: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0 24px;
    height: 64px;
  }
  .dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #d4d4d4;
    transition: background 0.06s ease, box-shadow 0.06s ease, transform 0.06s ease;
  }
  .dot.on {
    background: #1a1a1a;
    box-shadow: 0 0 12px rgba(26, 26, 26, 0.25);
    transform: scale(1.3);
  }

  /* ── BPM Grid ── */
  .bpm-grid {
    width: 100%;
    max-width: 400px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding-bottom: 24px;
  }
  .bpm-btn {
    appearance: none;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #1a1a1a;
    padding: 18px 0;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .bpm-btn:active {
    transform: scale(0.96);
  }
  .bpm-btn.active {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  /* ── Stop button ── */
  .stop-area {
    width: 100%;
    max-width: 400px;
    padding-bottom: 20px;
    display: flex;
    justify-content: center;
  }
  .stop-btn {
    appearance: none;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #999;
    padding: 14px 48px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
    opacity: 0;
    pointer-events: none;
  }
  .stop-btn:active { transform: scale(0.96); }
  .stop-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Spacer ── */
  .spacer { flex: 1; }

  /* ── Tap Tempo ── */
  .top-bar {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 32px;
  }
  .tap-btn {
    appearance: none;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #1a1a1a;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .tap-btn:active { transform: scale(0.96); background: #f5f5f5; }
  .tap-bpm {
    font-size: 32px;
    font-weight: 500;
    color: #999;
    min-width: 60px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="top-bar">
  <button class="tap-btn" id="tapBtn">Tap</button>
  <div class="tap-bpm" id="tapBpm"></div>
</div>

<div class="header">
  <h1>Worship Tempo</h1>
</div>

<div class="pulse-area">
  <div class="dot" id="dot"></div>
</div>

<div class="bpm-grid" id="bpmGrid"></div>

<div class="stop-area">
  <button class="stop-btn" id="stopBtn">Stop</button>
</div>

<div class="spacer"></div>

<script>
(() => {
  const dot = document.getElementById('dot');
  const grid = document.getElementById('bpmGrid');
  const stopBtn = document.getElementById('stopBtn');
  const tapBtn = document.getElementById('tapBtn');
  const tapBpmDisplay = document.getElementById('tapBpm');

  let activeBpm = null;
  let intervalId = null;
  let dotTimeout = null;

  // ── Build BPM buttons ──
  for (let bpm = 60; bpm <= 130; bpm += 5) {
    const btn = document.createElement('button');
    btn.className = 'bpm-btn';
    btn.textContent = bpm;
    btn.dataset.bpm = bpm;
    btn.addEventListener('click', () => startMetronome(bpm, btn));
    grid.appendChild(btn);
  }

  function startMetronome(bpm, btn) {
    stopMetronome();
    activeBpm = bpm;

    // Highlight active button
    document.querySelectorAll('.bpm-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Show stop button
    stopBtn.classList.add('visible');

    // Calculate interval
    const ms = 60000 / bpm;

    // Flash immediately, then on interval
    flash();
    intervalId = setInterval(flash, ms);
  }

  function flash() {
    dot.classList.add('on');
    clearTimeout(dotTimeout);
    dotTimeout = setTimeout(() => dot.classList.remove('on'), 80);
  }

  function stopMetronome() {
    clearInterval(intervalId);
    clearTimeout(dotTimeout);
    intervalId = null;
    activeBpm = null;
    dot.classList.remove('on');
    document.querySelectorAll('.bpm-btn').forEach(b => b.classList.remove('active'));
    stopBtn.classList.remove('visible');
  }

  stopBtn.addEventListener('click', stopMetronome);

  // ── Tap Tempo ──
  let tapTimes = [];
  const TAP_RESET_MS = 2000;

  tapBtn.addEventListener('click', () => {
    const now = performance.now();

    // Reset if too long since last tap
    if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS) {
      tapTimes = [];
    }

    tapTimes.push(now);

    // Keep last 6 taps
    if (tapTimes.length > 6) tapTimes.shift();

    if (tapTimes.length >= 2) {
      const intervals = [];
      for (let i = 1; i < tapTimes.length; i++) {
        intervals.push(tapTimes[i] - tapTimes[i - 1]);
      }
      const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      const bpm = Math.round(60000 / avgMs);
      tapBpmDisplay.textContent = bpm + ' bpm';
    }
  });
})();
</script>
</body>
</html>
