<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Series Summary</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --surface-warm: #f6f3ee;
            --text: #1a1a1a;
            --muted: #625f58;
            --border: #e8e3da;
            --shadow: 0 10px 28px rgba(25, 22, 17, 0.06);
            --radius: 22px;
            --radius-sm: 16px;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            --font-serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background:
                radial-gradient(circle at top left, rgba(244, 239, 231, 0.7), transparent 30%),
                linear-gradient(180deg, #fbfaf7 0%, #f7f4ee 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            width: min(100%, 1100px);
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: max(env(safe-area-inset-top), 16px) 0 16px;
            background: rgba(250, 250, 248, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .back-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            text-decoration: none;
            color: #1e6fa0;
            background: rgba(30, 111, 160, 0.1);
            font-size: 1.65rem;
            flex-shrink: 0;
        }

        .hero {
            flex: 1;
            min-width: 0;
        }

        .eyebrow {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #907245;
            margin-bottom: 5px;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: clamp(1.9rem, 4vw, 2.8rem);
            line-height: 0.98;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .hero-copy {
            max-width: 760px;
            color: var(--muted);
            font-size: 1rem;
        }

        .hero-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .hero-stat {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 0.86rem;
            color: #4d473e;
        }

        .hero-stat strong {
            color: var(--text);
        }

        .jump-panel {
            margin-top: 8px;
            margin-bottom: 22px;
            padding: 18px;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .jump-label {
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #8c7754;
            margin-bottom: 12px;
        }

        .jump-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }

        .jump-card {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            padding: 14px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid color-mix(in srgb, var(--course-color) 18%, white);
            background: color-mix(in srgb, var(--course-soft) 48%, white);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .jump-card:hover,
        .jump-card:focus-visible {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(31, 25, 18, 0.08);
            border-color: color-mix(in srgb, var(--course-color) 36%, white);
            outline: none;
        }

        .jump-marker {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--course-color);
            font-size: 0.92rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .jump-text strong {
            display: block;
            font-size: 0.92rem;
            line-height: 1.15;
            margin-bottom: 2px;
        }

        .jump-text span {
            display: block;
            font-size: 0.78rem;
            color: #5d5851;
        }

        .summary-content {
            display: grid;
            gap: 24px;
        }

        .course-section {
            scroll-margin-top: 120px;
        }

        .course-shell {
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .course-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 20px 22px;
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--course-soft) 78%, white), rgba(255, 255, 255, 0.9));
            border-bottom: 1px solid color-mix(in srgb, var(--course-color) 18%, white);
        }

        .course-title-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .course-badge {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 1rem;
            font-weight: 800;
            color: var(--course-color);
            background: rgba(255, 255, 255, 0.78);
            flex-shrink: 0;
        }

        .course-title {
            font-family: var(--font-serif);
            font-size: clamp(1.45rem, 3vw, 1.85rem);
            line-height: 1;
            margin-bottom: 5px;
        }

        .course-subtitle {
            color: #59544e;
            font-size: 0.92rem;
        }

        .course-metrics {
            text-align: right;
            flex-shrink: 0;
        }

        .course-metrics strong {
            display: block;
            font-size: 1.15rem;
            color: var(--course-color);
        }

        .course-metrics span {
            font-size: 0.83rem;
            color: #655e54;
        }

        .lesson-list {
            display: grid;
            gap: 0;
        }

        .lesson-card {
            display: grid;
            grid-template-columns: 86px minmax(0, 1fr);
            gap: 16px;
            padding: 18px 22px;
            border-top: 1px solid var(--border);
        }

        .lesson-card:first-child {
            border-top: none;
        }

        .lesson-id-badge {
            width: 74px;
            min-height: 74px;
            display: grid;
            place-items: center;
            align-content: center;
            border-radius: 20px;
            background: color-mix(in srgb, var(--course-soft) 60%, white);
            border: 1px solid color-mix(in srgb, var(--course-color) 18%, white);
            color: var(--course-color);
            text-align: center;
            padding: 8px;
        }

        .lesson-id-badge strong {
            display: block;
            font-size: 0.98rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .lesson-id-badge span {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #65594c;
        }

        .lesson-main {
            min-width: 0;
        }

        .lesson-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .lesson-title-wrap {
            min-width: 0;
        }

        .lesson-kicker {
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #8c7654;
            margin-bottom: 5px;
        }

        .lesson-title {
            font-size: 1.08rem;
            line-height: 1.25;
            font-weight: 700;
        }

        .progress-wrap {
            min-width: 110px;
            text-align: right;
            flex-shrink: 0;
        }

        .progress-value {
            font-size: 1rem;
            font-weight: 800;
            color: var(--course-color);
        }

        .progress-bar {
            height: 8px;
            border-radius: 999px;
            background: #ece6dc;
            overflow: hidden;
            margin-top: 7px;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, color-mix(in srgb, var(--course-color) 70%, white), var(--course-color));
        }

        .lesson-meta-grid {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 16px;
            margin-bottom: 12px;
        }

        .meta-card {
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface-warm);
            padding: 12px 13px;
        }

        .meta-label {
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #8e7242;
            margin-bottom: 6px;
        }

        .meta-value {
            font-size: 0.9rem;
            color: #2d2a25;
        }

        .meta-note {
            margin-top: 6px;
            font-size: 0.82rem;
            color: #615a51;
        }

        .lesson-summary {
            font-size: 0.96rem;
            color: #38332d;
        }

        .lesson-summary.under-construction {
            color: #8d5c2f;
            font-weight: 700;
        }

        .loading,
        .error-state {
            padding: 28px;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            color: #514a42;
        }

        @media (max-width: 960px) {
            .jump-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .page {
                padding: 0 14px 28px;
            }

            .topbar {
                align-items: center;
            }

            .hero-copy {
                font-size: 0.95rem;
            }

            .jump-grid {
                grid-template-columns: 1fr;
            }

            .course-header,
            .lesson-card {
                padding-left: 16px;
                padding-right: 16px;
            }

            .course-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .course-metrics {
                text-align: left;
            }

            .lesson-card {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .lesson-id-badge {
                width: 100%;
                min-height: 62px;
                grid-template-columns: auto 1fr;
                grid-auto-flow: column;
                gap: 10px;
                justify-content: flex-start;
                text-align: left;
                place-items: center start;
            }

            .lesson-head {
                flex-direction: column;
                gap: 10px;
            }

            .progress-wrap {
                width: 100%;
                min-width: 0;
                text-align: left;
            }

            .lesson-meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="topbar">
            <a class="back-link" href="index.html" aria-label="Back to home">&#8249;</a>
            <div class="hero">
                <div class="eyebrow">Series Summary</div>
                <h1>All 47 lessons, pulled straight from the TOC.</h1>
                <p class="hero-copy">This page is driven by <code>curriculum-toc.csv</code> so you only maintain the
                    lesson summary data in one place. Use the course jump cards to move through the full writing list
                    quickly.</p>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
        </div>

        <section class="jump-panel">
            <div class="jump-label">Jump to a course</div>
            <div class="jump-grid" id="jump-grid"></div>
        </section>

        <main class="summary-content" id="summary-content">
            <div class="loading">Loading series summary...</div>
        </main>
    </div>

    <script>
        const COURSE_META = {
            "101": { name: "Starting in Discipleship", subtitle: "First steps of faith", color: "#1E6FA0", soft: "#DCEEFB" },
            "201": { name: "Growing Deep", subtitle: "Rooted in the gospel", color: "#1A6B55", soft: "#D4F2E8" },
            "202": { name: "Growing Up", subtitle: "Faith in everyday life", color: "#1D6B3F", soft: "#D1EDD9" },
            "203": { name: "Growing Out", subtitle: "Mission and multiplication", color: "#1A5C38", soft: "#CCE6D4" },
            "301": { name: "Leading in Discipleship", subtitle: "Leading others well", color: "#C85A56", soft: "#FCEAE8" }
        };

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let cell = "";
            let inQuotes = false;

            for (let index = 0; index < text.length; index += 1) {
                const char = text[index];
                const next = text[index + 1];

                if (char === "\"") {
                    if (inQuotes && next === "\"") {
                        cell += "\"";
                        index += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                    continue;
                }

                if (char === "," && !inQuotes) {
                    row.push(cell);
                    cell = "";
                    continue;
                }

                if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && next === "\n") {
                        index += 1;
                    }
                    row.push(cell);
                    if (row.some(value => value !== "")) {
                        rows.push(row);
                    }
                    row = [];
                    cell = "";
                    continue;
                }

                cell += char;
            }

            row.push(cell);
            if (row.some(value => value !== "")) {
                rows.push(row);
            }

            return rows;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getField(row, indexMap, names) {
            for (const name of names) {
                const index = indexMap[name];
                if (typeof index === "number") {
                    return (row[index] || "").trim();
                }
            }
            return "";
        }

        function cleanValue(value, fallback = "TBD") {
            const trimmed = (value || "").trim();
            if (!trimmed || trimmed.toLowerCase() === "seek") {
                return fallback;
            }
            return trimmed;
        }

        function buildCurriculum(rows) {
            const header = rows[0].map(value => value.trim());
            const indexMap = Object.fromEntries(header.map((name, index) => [name, index]));
            const courses = [];
            let currentCourse = null;

            for (const row of rows.slice(1)) {
                const courseCell = (row[0] || "").trim();
                const lessonCell = (row[1] || "").trim();
                const topic = getField(row, indexMap, ["Topic"]);

                if (!courseCell) {
                    continue;
                }

                if (!lessonCell) {
                    const match = courseCell.match(/^(\d{3})/);
                    if (match && COURSE_META[match[1]]) {
                        currentCourse = {
                            id: match[1],
                            ...COURSE_META[match[1]],
                            lessons: []
                        };
                        courses.push(currentCourse);
                    }
                    continue;
                }

                if (!currentCourse || !topic) {
                    continue;
                }

                const lessonNum = Number.parseInt((lessonCell.split(".")[1] || "0"), 10);
                const progress = Number.parseInt(getField(row, indexMap, ["Progress"]) || "0", 10) || 0;
                const summary = getField(row, indexMap, ["Summary", "Description"]);
                const tool = getField(row, indexMap, ["Tool Used", "Tools"]);
                const keyVerse = getField(row, indexMap, ["Key Verse"]);
                const keyBible = getField(row, indexMap, ["Key Bible Chapters"]);
                const passageNote = getField(row, indexMap, ["Passage Notes", "Key Story", "Key Framework", "Key Line"]);

                currentCourse.lessons.push({
                    id: lessonCell,
                    lessonNum,
                    topic,
                    progress: Math.max(0, Math.min(progress, 100)),
                    tool,
                    summary,
                    keyVerse,
                    keyBible,
                    passageNote
                });
            }

            return courses;
        }

        function renderHeroStats(courses) {
            const totalLessons = courses.reduce((sum, course) => sum + course.lessons.length, 0);
            const startedLessons = courses.reduce((sum, course) => sum + course.lessons.filter(lesson => lesson.progress > 0).length, 0);
            const averageProgress = totalLessons
                ? Math.round(courses.reduce((sum, course) => sum + course.lessons.reduce((courseSum, lesson) => courseSum + lesson.progress, 0), 0) / totalLessons)
                : 0;

            document.getElementById("hero-stats").innerHTML = `
                <div class="hero-stat"><strong>${totalLessons}</strong> total lessons</div>
                <div class="hero-stat"><strong>${startedLessons}</strong> started</div>
                <div class="hero-stat"><strong>${averageProgress}%</strong> average progress</div>
            `;
        }

        function renderJumpGrid(courses) {
            document.getElementById("jump-grid").innerHTML = courses.map(course => `
                <a class="jump-card" href="#course-${course.id}" style="--course-color:${course.color}; --course-soft:${course.soft};">
                    <div class="jump-marker">${course.id}</div>
                    <div class="jump-text">
                        <strong>${escapeHtml(course.name)}</strong>
                        <span>${course.lessons.length} lessons</span>
                    </div>
                </a>
            `).join("");
        }

        function buildPassagesHtml(lesson) {
            const parts = [];

            if (lesson.keyVerse) {
                parts.push(`<strong>Primary:</strong> ${escapeHtml(lesson.keyVerse)}`);
            }

            if (lesson.keyBible) {
                parts.push(`<strong>Related:</strong> ${escapeHtml(lesson.keyBible)}`);
            }

            const addresses = parts.length ? parts.join("<br>") : "TBD";
            const note = cleanValue(lesson.passageNote, lesson.progress === 0 ? "Under construction." : "Add a brief reminder line in the TOC.");

            return `
                <div class="meta-value">${addresses}</div>
                <div class="meta-note">${escapeHtml(note)}</div>
            `;
        }

        function renderLessons(course) {
            return course.lessons.map(lesson => {
                const summaryText = lesson.progress === 0
                    ? "Under construction."
                    : cleanValue(lesson.summary, "Under construction.");
                const toolText = lesson.progress === 0 && !lesson.tool
                    ? "TBD"
                    : cleanValue(lesson.tool, "TBD");

                return `
                    <article class="lesson-card">
                        <div class="lesson-id-badge" style="--course-color:${course.color}; --course-soft:${course.soft};">
                            <div>
                                <strong>${escapeHtml(lesson.id)}</strong>
                                <span>Lesson ${String(lesson.lessonNum).padStart(2, "0")}</span>
                            </div>
                        </div>
                        <div class="lesson-main">
                            <div class="lesson-head">
                                <div class="lesson-title-wrap">
                                    <div class="lesson-kicker">${escapeHtml(course.name)}</div>
                                    <div class="lesson-title">${escapeHtml(lesson.topic)}</div>
                                </div>
                                <div class="progress-wrap">
                                    <div class="progress-value">${lesson.progress}% done</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width:${lesson.progress}%; --course-color:${course.color};"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="lesson-meta-grid">
                                <div class="meta-card">
                                    <div class="meta-label">Tool Used</div>
                                    <div class="meta-value">${escapeHtml(toolText)}</div>
                                </div>
                                <div class="meta-card">
                                    <div class="meta-label">Key Passage(s)</div>
                                    ${buildPassagesHtml(lesson)}
                                </div>
                            </div>
                            <p class="lesson-summary ${summaryText === "Under construction." ? "under-construction" : ""}">${escapeHtml(summaryText)}</p>
                        </div>
                    </article>
                `;
            }).join("");
        }

        function renderSummary(courses) {
            document.getElementById("summary-content").innerHTML = courses.map(course => {
                const startedLessons = course.lessons.filter(lesson => lesson.progress > 0).length;
                const averageProgress = course.lessons.length
                    ? Math.round(course.lessons.reduce((sum, lesson) => sum + lesson.progress, 0) / course.lessons.length)
                    : 0;

                return `
                    <section class="course-section" id="course-${course.id}">
                        <div class="course-shell">
                            <div class="course-header" style="--course-color:${course.color}; --course-soft:${course.soft};">
                                <div class="course-title-wrap">
                                    <div class="course-badge">${course.id}</div>
                                    <div>
                                        <div class="course-title">${escapeHtml(course.name)}</div>
                                        <div class="course-subtitle">${escapeHtml(course.subtitle)}</div>
                                    </div>
                                </div>
                                <div class="course-metrics">
                                    <strong>${startedLessons}/${course.lessons.length}</strong>
                                    <span>started · ${averageProgress}% avg progress</span>
                                </div>
                            </div>
                            <div class="lesson-list">
                                ${renderLessons(course)}
                            </div>
                        </div>
                    </section>
                `;
            }).join("");
        }

        async function init() {
            const content = document.getElementById("summary-content");

            try {
                const response = await fetch(`curriculum-toc.csv?v=${Date.now()}`);
                if (!response.ok) {
                    throw new Error(`Failed to load curriculum-toc.csv (${response.status})`);
                }

                const csv = (await response.text()).replace(/^\uFEFF/, "");
                const rows = parseCSV(csv);
                const courses = buildCurriculum(rows);

                renderHeroStats(courses);
                renderJumpGrid(courses);
                renderSummary(courses);
            } catch (error) {
                console.error(error);
                content.innerHTML = `<div class="error-state">Could not load the series summary from <code>curriculum-toc.csv</code>.</div>`;
            }
        }

        init();
    </script>
</body>

</html>
