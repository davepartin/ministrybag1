<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roots of Discipline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap');

        :root {
            --green: #1A6B55;
            --soft-green: #D4F2E8;
            --charcoal: #2C2416;
            --ink: #2F2A21;
            --paper: #FFFFFF;
            --cream: #F5F1E6;
            --scene-sky: #F1F4E4;
            --border: #E7DECE;
            --muted: #766D60;
            --shadow: 0 10px 26px rgba(44, 36, 22, 0.10);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background: #F8F6F1;
            color: var(--ink);
            font-family: 'Inter', 'Trebuchet MS', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .widget {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            overflow: hidden;
            background: #FAF8F1;
        }

        @media (max-width: 559px) {
            .widget {
                width: min(100vw, 413px);
                max-width: min(100vw, 413px);
            }
        }

        @media (min-width: 560px) {
            body {
                padding: 16px;
            }

            .widget {
                border: 1px solid #E8DFD0;
                border-radius: 18px;
                box-shadow: var(--shadow);
            }
        }

        .title-bar {
            background: #211D14;
            padding: 7px 14px 8px;
            text-align: center;
        }

        .title-bar h1 {
            margin: 0;
            color: #FBF8F1;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 0.09em;
            line-height: 1.15;
        }

        .scene-wrap {
            position: relative;
            overflow: hidden;
            height: 330px;
            background: var(--scene-sky);
            border-bottom: 1px solid #E5DCCB;
        }

        #scene {
            position: absolute;
            top: 0;
            left: 50%;
            width: 100%;
            height: 330px;
            transform: translateX(-50%);
            transform-origin: top center;
        }

        .scene-svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .intro-overlay {
            position: absolute;
            inset: 0;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(241, 244, 228, 0.20), rgba(241, 244, 228, 0.78));
            pointer-events: none;
            text-align: center;
        }

        .intro-card {
            max-width: 320px;
            padding: 18px 18px 16px;
            border: 1px solid rgba(226, 217, 200, 0.9);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 14px 32px rgba(44, 36, 22, 0.10);
            backdrop-filter: blur(4px);
        }

        .intro-verse {
            margin: 0 0 8px;
            color: var(--charcoal);
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 17px;
            font-weight: 600;
            font-style: italic;
            line-height: 1.35;
        }

        .intro-ref {
            margin: 0;
            color: var(--green);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .card-area {
            background: #FAF8F1;
            padding: 8px 12px 8px;
        }

        .verse-card {
            overflow: hidden;
            border: 1px solid #E8DFD0;
            border-radius: 14px;
            background: var(--paper);
            box-shadow: 0 7px 18px rgba(44, 36, 22, 0.07);
            animation: fadeSlide 0.3s ease both;
        }

        .verse-bar {
            height: 4px;
            background: var(--card-color, var(--green));
        }

        .verse-content {
            height: 112px;
            padding: 10px 16px;
            overflow: hidden;
        }

        .verse-title {
            margin: 0 0 4px;
            color: var(--card-color, var(--green));
            font-family: 'Inter', 'Trebuchet MS', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.01em;
            line-height: 1.24;
        }

        .verse-text {
            margin: 0;
            color: #3E3529;
            font-family: Georgia, Cambria, serif;
            font-size: 12.7px;
            line-height: 1.36;
        }

        .verse-text b {
            color: var(--card-color, var(--green));
            font-weight: 700;
        }

        .card-note {
            display: block;
            margin-top: 5px;
            color: #5A4F42;
            font-style: italic;
        }

        .verse-ref {
            margin: 5px 0 0;
            color: var(--card-color, var(--green));
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.01em;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
            padding: 0 2px;
        }

        .nav-btn {
            min-width: 76px;
            padding: 8px 13px;
            border: 1.5px solid rgba(44, 36, 22, 0.14);
            border-radius: 11px;
            background: #FFFFFF;
            color: var(--charcoal);
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        .nav-btn:active {
            transform: translateY(1px);
        }

        .nav-btn.primary {
            min-width: 98px;
            border-color: transparent;
            background: var(--card-color, var(--green));
            color: #FFFFFF;
            box-shadow: 0 5px 13px rgba(44, 36, 22, 0.14);
        }

        .nav-btn.hidden {
            visibility: hidden;
        }

        .dots {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            padding: 0;
            border: 0;
            border-radius: 999px;
            background: rgba(44, 36, 22, 0.20);
            transition: width 0.25s ease, background 0.25s ease;
        }

        .dot.available {
            cursor: pointer;
        }

        .dot.current {
            width: 20px;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 340px) {
            .verse-content {
                height: 118px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
<main class="widget" aria-label="Five spiritual disciplines as roots growing deep into Christ">
    <header class="title-bar">
        <h1>Roots of Discipline</h1>
    </header>

    <section class="scene-wrap" aria-label="A wide tree trunk with five wavy roots growing down through soil marked JESUS">
        <div id="scene"></div>
    </section>

    <section class="card-area" id="cardArea" aria-live="polite"></section>
</main>

<script>
(function () {
    var NS = 'http://www.w3.org/2000/svg';
    var W = 460;
    var H = 330;
    var step = -1;
    var baseColor = '#5A4E3C';
    var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var roots = [
        {
            name: 'Prayer',
            color: '#B39336',
            tip: { x: 70, y: 240, r: 12 },
            labelPos: { x: 91, y: 163, angle: -50, size: 18.75 },
            path: 'M 160 68 C 132 94, 113 119, 94 151 C 79 176, 73 211, 70 240',
            title: 'Prayer',
            verse: '"<b>Pray in the Spirit</b> on all occasions."',
            note: 'Prayer is not how you climb to God. It is how you walk home.',
            ref: 'Ephesians 6:18'
        },
        {
            name: 'The Word',
            color: '#2F7A63',
            tip: { x: 126, y: 285, r: 12 },
            labelPos: { x: 151, y: 188, angle: -72, size: 18 },
            path: 'M 196 70 C 174 102, 166 128, 154 164 C 143 199, 143 236, 126 285',
            title: 'The Word',
            verse: '"I have <b>stored up your word</b> in my heart..."',
            note: 'God\'s voice is what keeps you green in a dry year.',
            ref: 'Psalm 119:11'
        },
        {
            name: 'Fellowship',
            color: '#8B6A4B',
            tip: { x: 230, y: 285, r: 12 },
            labelPos: { x: 230, y: 202, angle: 90, size: 18 },
            path: 'M 230 70 C 224 108, 238 143, 229 181 C 220 219, 235 240, 230 285',
            title: 'Fellowship',
            verse: '"Let us <b>stir up one another</b> to love and good works..."',
            note: 'No one was ever meant to follow Jesus alone.',
            ref: 'Hebrews 10:24-25'
        },
        {
            name: 'Stewardship',
            color: '#6B7787',
            tip: { x: 334, y: 280, r: 12 },
            labelPos: { x: 309, y: 188, angle: 72, size: 17.25 },
            path: 'M 264 70 C 286 102, 294 128, 306 164 C 317 199, 317 232, 334 280',
            title: 'Stewardship',
            verse: '"<b>God loves a cheerful giver.</b>"',
            note: 'Generosity begins when you stop pretending you are the owner.',
            ref: '2 Corinthians 9:7'
        },
        {
            name: 'Fighting Sin',
            color: '#816199',
            tip: { x: 390, y: 240, r: 12 },
            labelPos: { x: 369, y: 163, angle: 50, size: 17.25 },
            path: 'M 300 68 C 328 94, 347 119, 366 151 C 381 176, 387 211, 390 240',
            title: 'Fighting Sin',
            verse: '"Abstain from the <b>passions of the flesh</b>..."',
            note: 'You fight sin by running to Jesus, not by trying harder.',
            ref: '1 Peter 2:11'
        }
    ];

    function svgEl(tag, attrs) {
        var el = document.createElementNS(NS, tag);
        Object.keys(attrs || {}).forEach(function (key) {
            el.setAttribute(key, attrs[key]);
        });
        return el;
    }

    function hexToRgba(hex, alpha) {
        var clean = hex.replace('#', '');
        var num = parseInt(clean, 16);
        var r = (num >> 16) & 255;
        var g = (num >> 8) & 255;
        var b = num & 255;
        return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function currentColor() {
        return step === -1 ? baseColor : roots[step].color;
    }

    function animateStroke(path, delay) {
        if (reducedMotion || !path.getTotalLength) return;
        var len = path.getTotalLength();
        path.setAttribute('stroke-dasharray', len);
        path.setAttribute('stroke-dashoffset', len);
        path.style.transition = 'stroke-dashoffset 1100ms ease';
        window.setTimeout(function () {
            path.setAttribute('stroke-dashoffset', '0');
        }, delay || 100);
    }

    function buildBackdrop(svg) {
        var defs = svgEl('defs', {});

        var soil = svgEl('linearGradient', { id: 'soil', x1: '0', y1: '0', x2: '0', y2: '1' });
        soil.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#85613B' }));
        soil.appendChild(svgEl('stop', { offset: '54%', 'stop-color': '#5C3D20' }));
        soil.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#33200F' }));
        defs.appendChild(soil);

        svg.appendChild(defs);

        // The top band is only about 20 percent of the visual: ground, grass, and trunk.
        svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: 66, fill: '#F0EBD7' }));
        svg.appendChild(svgEl('path', {
            d: 'M 0 56 C 70 48, 138 53, 214 52 C 292 51, 370 56, 460 50 L 460 66 L 0 66 Z',
            fill: '#B9C49B',
            opacity: '0.92'
        }));
        svg.appendChild(svgEl('rect', { x: 0, y: 66, width: W, height: H - 66, fill: 'url(#soil)' }));
        svg.appendChild(svgEl('path', {
            d: 'M 0 66 C 82 70, 148 62, 226 66 C 312 70, 383 63, 460 67',
            stroke: '#4F321B',
            'stroke-width': 4,
            fill: 'none',
            opacity: '0.68'
        }));

        var watermark = svgEl('text', {
            x: 230,
            y: 202,
            'text-anchor': 'middle',
            'font-family': 'Inter, Trebuchet MS, sans-serif',
            'font-size': 92,
            'font-weight': 900,
            fill: '#F8F0DD',
            opacity: '0.11',
            'letter-spacing': '0.04em'
        });
        watermark.textContent = 'JESUS';
        svg.appendChild(watermark);

        svg.appendChild(svgEl('path', { d: 'M 0 138 C 92 132, 198 142, 282 136 C 358 131, 416 137, 460 134', stroke: '#3F2814', 'stroke-width': 1, fill: 'none', opacity: '0.28' }));
        svg.appendChild(svgEl('path', { d: 'M 0 238 C 110 232, 208 243, 312 236 C 380 232, 424 237, 460 235', stroke: '#25170B', 'stroke-width': 1, fill: 'none', opacity: '0.34' }));

        // Pebbles scattered through soil
        var pebbles = [
            [42, 108, 2.6, '#3F2C1A'],
            [108, 128, 3.2, '#3F2C1A'],
            [186, 112, 2.4, '#46311E'],
            [292, 122, 3.0, '#3F2C1A'],
            [358, 142, 2.7, '#46311E'],
            [78, 214, 3.4, '#2E1F0E'],
            [200, 260, 2.9, '#2E1F0E'],
            [338, 222, 3.1, '#2E1F0E'],
            [394, 286, 2.5, '#2E1F0E']
        ];
        pebbles.forEach(function (p) {
            svg.appendChild(svgEl('ellipse', {
                cx: p[0],
                cy: p[1],
                rx: p[2],
                ry: p[2] * 0.7,
                fill: p[3],
                opacity: '0.55'
            }));
        });

        // Grass tufts at ground line
        for (var i = 4; i < W; i += 11) {
            var h = 5 + (i % 3);
            svg.appendChild(svgEl('path', {
                d: 'M ' + i + ' 66 L ' + (i + 2) + ' ' + (66 - h) + ' L ' + (i + 4) + ' 66',
                stroke: '#7C9856',
                'stroke-width': 1.2,
                fill: 'none',
                'stroke-linecap': 'round'
            }));
        }
    }

    function buildTree(svg) {
        // A simple line-drawn trunk emerging from the grass line.
        var trunkPath = 'M 189 -90 L 271 -90 C 271 -35, 282 22, 319 74 C 282 64, 178 64, 141 74 C 178 22, 189 -35, 189 -90 Z';
        svg.appendChild(svgEl('path', {
            d: trunkPath,
            fill: '#FFFFFF',
            stroke: '#1F1B14',
            'stroke-width': 2.2,
            'stroke-linejoin': 'round'
        }));

        // Bark detail
        [
            'M 198 -78 C 198 -32, 188 26, 163 70',
            'M 219 -82 C 216 -24, 212 28, 202 66',
            'M 241 -82 C 244 -24, 248 28, 258 66',
            'M 262 -78 C 262 -32, 272 26, 297 70'
        ].forEach(function (d) {
            svg.appendChild(svgEl('path', {
                d: d,
                stroke: '#1F1B14',
                'stroke-width': 1.4,
                fill: 'none',
                opacity: '0.62',
                'stroke-linecap': 'round'
            }));
        });
    }

    function buildRoots(svg) {
        for (var i = 0; i <= step; i++) {
            var outline = svgEl('path', {
                d: roots[i].path,
                fill: 'none',
                stroke: '#1F1B14',
                'stroke-width': 24,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round'
            });
            svg.appendChild(outline);

            var root = svgEl('path', {
                d: roots[i].path,
                fill: 'none',
                stroke: '#FFFFFF',
                'stroke-width': 20,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round',
                opacity: '0.98'
            });
            svg.appendChild(root);

            if (i === step) {
                animateStroke(outline, 70);
                animateStroke(root, 90);
            }
        }
    }

    function buildRootLabels(svg) {
        roots.forEach(function (root, idx) {
            if (idx > step) return;
            var lbl = root.labelPos;
            var label = svgEl('text', {
                x: lbl.x,
                y: lbl.y,
                'text-anchor': 'middle',
                'dominant-baseline': 'middle',
                'font-family': 'Inter, Trebuchet MS, sans-serif',
                'font-size': lbl.size,
                'font-weight': 900,
                fill: '#1F1B14',
                stroke: 'rgba(255, 255, 255, 0.86)',
                'stroke-width': 4,
                'paint-order': 'stroke fill',
                'letter-spacing': '0.01em',
                transform: 'rotate(' + lbl.angle + ' ' + lbl.x + ' ' + lbl.y + ')'
            });
            label.textContent = root.name;
            svg.appendChild(label);
        });
    }

    function buildIntro(container) {
        var overlay = document.createElement('div');
        overlay.className = 'intro-overlay';
        overlay.innerHTML =
            '<div class="intro-card">' +
                '<p class="intro-verse">"Rooted and built up in him and established in the faith."</p>' +
                '<p class="intro-ref">Colossians 2:7 ESV</p>' +
            '</div>';
        container.appendChild(overlay);
    }

    function buildScene() {
        var scene = document.getElementById('scene');
        scene.innerHTML = '';

        var svg = svgEl('svg', {
            class: 'scene-svg',
            viewBox: '0 0 ' + W + ' ' + H,
            role: 'img',
            'aria-label': 'A white line-drawn trunk with five white roots forming one at a time into soil marked JESUS'
        });

        buildBackdrop(svg);
        buildRoots(svg);
        buildTree(svg);
        buildRootLabels(svg);
        scene.appendChild(svg);
    }

    function buildCard() {
        var area = document.getElementById('cardArea');
        var color = currentColor();
        area.innerHTML = '';
        area.style.setProperty('--card-color', color);

        var card = document.createElement('div');
        card.className = 'verse-card';
        card.innerHTML = '<div class="verse-bar"></div>';

        var content = document.createElement('div');
        content.className = 'verse-content';

        var title = document.createElement('h2');
        title.className = 'verse-title';
        var text = document.createElement('p');
        text.className = 'verse-text';

        if (step === -1) {
            title.textContent = 'Rooted in Jesus';
            text.innerHTML = 'A tree stands or falls by what its roots are doing. Jesus is the Good Soil your life reaches into. The deeper your roots run in Him, the more steady and fruitful you become.';
            content.appendChild(title);
            content.appendChild(text);
        } else {
            var s = roots[step];
            title.textContent = s.title;
            text.innerHTML = s.verse + '<span class="card-note">' + s.note + '</span>';
            content.appendChild(title);
            content.appendChild(text);

            var ref = document.createElement('p');
            ref.className = 'verse-ref';
            ref.textContent = s.ref;
            content.appendChild(ref);
        }

        card.appendChild(content);
        area.appendChild(card);
        area.appendChild(buildNav());
    }

    function buildNav() {
        var nav = document.createElement('div');
        nav.className = 'nav';

        var back = document.createElement('button');
        back.type = 'button';
        back.className = 'nav-btn' + (step === -1 ? ' hidden' : '');
        back.innerHTML = '&larr; Back';
        back.addEventListener('click', function () {
            if (step > -1) {
                step -= 1;
                render();
            }
        });
        nav.appendChild(back);

        var dots = document.createElement('div');
        dots.className = 'dots';
        roots.forEach(function (root, idx) {
            var dot = document.createElement('button');
            dot.type = 'button';
            dot.className = 'dot';
            dot.setAttribute('aria-label', 'Go to ' + root.title);
            if (idx <= step) {
                dot.classList.add('available');
                dot.style.background = idx === step ? root.color : hexToRgba(root.color, 0.42);
                dot.addEventListener('click', function () {
                    step = idx;
                    render();
                });
            }
            if (idx === step) dot.classList.add('current');
            dots.appendChild(dot);
        });
        nav.appendChild(dots);

        var next = document.createElement('button');
        next.type = 'button';
        next.className = 'nav-btn primary';
        next.style.background = currentColor();
        if (step === -1) {
            next.innerHTML = 'Begin &rarr;';
        } else if (step === roots.length - 1) {
            next.innerHTML = '&#8635; Restart';
        } else {
            next.innerHTML = 'Next &rarr;';
        }
        next.addEventListener('click', function () {
            if (step === -1) {
                step = 0;
            } else if (step === roots.length - 1) {
                step = -1;
            } else {
                step += 1;
            }
            render();
        });
        nav.appendChild(next);

        return nav;
    }

    function render() {
        document.documentElement.style.setProperty('--card-color', currentColor());
        buildScene();
        buildCard();
    }

    render();
}());
</script>
</body>
</html>
