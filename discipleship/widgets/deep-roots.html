<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Roots in the Good Soil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap');

        :root {
            --green: #1A6B55;
            --soft-green: #D4F2E8;
            --charcoal: #2C2416;
            --ink: #2F2A21;
            --paper: #FFFFFF;
            --cream: #F5F1E6;
            --sky: #EFF3E2;
            --soil-top: #8C6A43;
            --soil-mid: #5F4527;
            --soil-deep: #3A2A18;
            --border: #E7DECE;
            --muted: #766D60;
            --shadow: 0 10px 26px rgba(44, 36, 22, 0.10);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            color: var(--ink);
            font-family: 'Inter', 'Trebuchet MS', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .widget {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            overflow: hidden;
            background: #FAF8F1;
        }

        @media (min-width: 560px) {
            body {
                padding: 16px;
            }

            .widget {
                border: 1px solid #E8DFD0;
                border-radius: 18px;
                box-shadow: var(--shadow);
            }
        }

        .title-bar {
            background: #211D14;
            padding: 7px 14px 8px;
            text-align: center;
        }

        .title-bar h1 {
            margin: 0;
            color: #FBF8F1;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 0.09em;
            line-height: 1.15;
        }

        .scene-wrap {
            position: relative;
            overflow: hidden;
            height: 330px;
            background: var(--sky);
            border-bottom: 1px solid #E5DCCB;
        }

        #scene {
            position: absolute;
            top: 0;
            left: 50%;
            width: 100%;
            height: 330px;
            transform: translateX(-50%);
            transform-origin: top center;
        }

        .scene-svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .stop-pills {
            position: absolute;
            left: 10px;
            right: 10px;
            top: 78px;
            z-index: 8;
            height: 232px;
            pointer-events: none;
        }

        .stop-pill {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            padding: 0 11px;
            border: 2px solid var(--pill-color);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 4px 10px rgba(44, 36, 22, 0.12);
            color: #3D352B;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.38s ease, transform 0.38s ease;
        }

        .stop-pill.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stop-pill:nth-child(1) {
            left: 12px;
            top: 4px;
            width: 96px;
        }

        .stop-pill:nth-child(2) {
            left: 305px;
            top: 4px;
            width: 118px;
        }

        .stop-pill:nth-child(3) {
            left: 155px;
            top: 192px;
            width: 110px;
        }

        .stop-pill:nth-child(4) {
            left: 8px;
            top: 120px;
            width: 124px;
        }

        .stop-pill:nth-child(5) {
            left: 282px;
            top: 120px;
            width: 134px;
        }

        .intro-overlay {
            position: absolute;
            inset: 0;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(239, 243, 226, 0.35), rgba(70, 50, 30, 0.55));
            pointer-events: none;
            text-align: center;
        }

        .intro-card {
            max-width: 320px;
            padding: 18px 18px 16px;
            border: 1px solid rgba(226, 217, 200, 0.9);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 14px 32px rgba(44, 36, 22, 0.14);
            backdrop-filter: blur(4px);
        }

        .intro-verse {
            margin: 0 0 8px;
            color: var(--charcoal);
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 17px;
            font-weight: 600;
            font-style: italic;
            line-height: 1.35;
        }

        .intro-ref {
            margin: 0;
            color: var(--green);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .card-area {
            background: #FAF8F1;
            padding: 8px 12px 8px;
        }

        .verse-card {
            overflow: hidden;
            border: 1px solid #E8DFD0;
            border-radius: 14px;
            background: var(--paper);
            box-shadow: 0 7px 18px rgba(44, 36, 22, 0.07);
            animation: fadeSlide 0.3s ease both;
        }

        .verse-bar {
            height: 4px;
            background: var(--card-color, var(--green));
        }

        .verse-content {
            height: 112px;
            padding: 10px 16px;
            overflow: hidden;
        }

        .verse-title {
            margin: 0 0 4px;
            color: var(--card-color, var(--green));
            font-family: 'Inter', 'Trebuchet MS', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.01em;
            line-height: 1.24;
        }

        .verse-text {
            margin: 0;
            color: #3E3529;
            font-family: Georgia, Cambria, serif;
            font-size: 12.7px;
            line-height: 1.36;
        }

        .verse-text b {
            color: var(--card-color, var(--green));
            font-weight: 700;
        }

        .card-note {
            display: block;
            margin-top: 5px;
            color: #5A4F42;
            font-style: italic;
        }

        .verse-ref {
            margin: 5px 0 0;
            color: var(--card-color, var(--green));
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.01em;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
            padding: 0 2px;
        }

        .nav-btn {
            min-width: 76px;
            padding: 8px 13px;
            border: 1.5px solid rgba(44, 36, 22, 0.14);
            border-radius: 11px;
            background: #FFFFFF;
            color: var(--charcoal);
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        .nav-btn:active {
            transform: translateY(1px);
        }

        .nav-btn.primary {
            min-width: 98px;
            border-color: transparent;
            background: var(--card-color, var(--green));
            color: #FFFFFF;
            box-shadow: 0 5px 13px rgba(44, 36, 22, 0.14);
        }

        .nav-btn.hidden {
            visibility: hidden;
        }

        .dots {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            padding: 0;
            border: 0;
            border-radius: 999px;
            background: rgba(44, 36, 22, 0.20);
            transition: width 0.25s ease, background 0.25s ease;
        }

        .dot.available {
            cursor: pointer;
        }

        .dot.current {
            width: 20px;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 340px) {
            .stop-pill {
                height: 28px;
                padding: 0 8px;
                font-size: 11px;
            }

            .stop-pill:nth-child(1) { width: 86px; }
            .stop-pill:nth-child(2) { left: 240px; width: 100px; }
            .stop-pill:nth-child(3) { left: 130px; width: 96px; }
            .stop-pill:nth-child(4) { width: 108px; }
            .stop-pill:nth-child(5) { left: 232px; width: 116px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
<main class="widget" aria-label="Deep Roots in the Good Soil interactive widget">
    <header class="title-bar">
        <h1>DEEP ROOTS IN JESUS, THE GOOD SOIL</h1>
    </header>

    <section class="scene-wrap" aria-label="A small plant with five roots reaching down into rich soil labeled Jesus the Good Soil">
        <div id="scene"></div>
    </section>

    <section class="card-area" id="cardArea" aria-live="polite"></section>
</main>

<script>
(function () {
    var NS = 'http://www.w3.org/2000/svg';
    var W = 460;
    var H = 330;
    var step = -1;
    var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Origin point where all roots begin (base of the sprout, at soil line)
    var ORIGIN = { x: 230, y: 96 };

    var stops = [
        {
            short: 'Prayer',
            title: 'Prayer',
            color: '#2F7A63',
            path: 'M 230 96 C 205 118, 168 134, 118 150',
            tip: { x: 118, y: 150 },
            verse: '"<b>Pray</b> in the Spirit on all occasions with all kinds of prayers and requests."',
            note: 'Prayer is the root that keeps you talking with the Father.',
            ref: 'Ephesians 6:18'
        },
        {
            short: 'The Word',
            title: 'The Word',
            color: '#8B6A4B',
            path: 'M 230 96 C 232 160, 235 228, 236 302',
            tip: { x: 236, y: 302 },
            verse: '"His delight is in the law of the Lord, and on his law he <b>meditates day and night</b>."',
            note: 'The deepest root. Read, study, memorize, and meditate.',
            ref: 'Psalm 1:2'
        },
        {
            short: 'Fellowship',
            title: 'Fellowship',
            color: '#A85D4C',
            path: 'M 230 96 C 258 118, 294 133, 344 148',
            tip: { x: 344, y: 148 },
            verse: '"Let us consider how to <b>stir up one another</b> to love and good works, not neglecting to meet together."',
            note: 'A root alone dries out. Roots beside roots grow strong.',
            ref: 'Hebrews 10:24-25'
        },
        {
            short: 'Stewardship',
            title: 'Stewardship',
            color: '#B39336',
            path: 'M 230 96 C 190 150, 130 198, 68 240',
            tip: { x: 68, y: 240 },
            verse: '"Each one must give as he has decided in his heart, for <b>God loves a cheerful giver</b>."',
            note: 'Time, talents, and treasure all belong to Him.',
            ref: '2 Corinthians 9:7'
        },
        {
            short: 'Fighting Sin',
            title: 'Fighting Sin',
            color: '#5E4A78',
            path: 'M 230 96 C 270 150, 330 198, 395 242',
            tip: { x: 395, y: 242 },
            verse: '"Abstain from the <b>passions of the flesh</b>, which wage war against your soul."',
            note: 'Deep roots give you strength to flee what would choke you.',
            ref: '1 Peter 2:11'
        }
    ];

    function svgEl(tag, attrs) {
        var el = document.createElementNS(NS, tag);
        Object.keys(attrs || {}).forEach(function (key) {
            el.setAttribute(key, attrs[key]);
        });
        return el;
    }

    function hexToRgba(hex, alpha) {
        var clean = hex.replace('#', '');
        var num = parseInt(clean, 16);
        var r = (num >> 16) & 255;
        var g = (num >> 8) & 255;
        var b = num & 255;
        return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function currentColor() {
        return step === -1 ? '#5A4E3C' : stops[step].color;
    }

    function animateStroke(path, delay) {
        if (reducedMotion || !path.getTotalLength) return;
        var len = path.getTotalLength();
        path.setAttribute('stroke-dasharray', len);
        path.setAttribute('stroke-dashoffset', len);
        path.style.transition = 'stroke-dashoffset 900ms ease';
        window.setTimeout(function () {
            path.setAttribute('stroke-dashoffset', '0');
        }, delay || 80);
    }

    function buildBackdrop(svg) {
        var defs = svgEl('defs', {});

        var sky = svgEl('linearGradient', { id: 'sky', x1: '0', y1: '0', x2: '0', y2: '1' });
        sky.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#F3F6E4' }));
        sky.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#E4E6C8' }));
        defs.appendChild(sky);

        var soil = svgEl('linearGradient', { id: 'soil', x1: '0', y1: '0', x2: '0', y2: '1' });
        soil.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#8C6A43' }));
        soil.appendChild(svgEl('stop', { offset: '40%', 'stop-color': '#6E4E2E' }));
        soil.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#3A2A18' }));
        defs.appendChild(soil);

        svg.appendChild(defs);

        // Sky
        svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: 96, fill: 'url(#sky)' }));

        // Sun
        svg.appendChild(svgEl('circle', { cx: 72, cy: 42, r: 22, fill: '#F6EEC4', opacity: '0.70' }));
        svg.appendChild(svgEl('circle', { cx: 72, cy: 42, r: 13, fill: '#F4E49A', opacity: '0.85' }));

        // Distant gentle hill
        svg.appendChild(svgEl('path', {
            d: 'M 0 88 C 80 72, 180 74, 260 80 C 340 86, 410 82, 460 86 L 460 96 L 0 96 Z',
            fill: '#B9C0A3',
            opacity: '0.78'
        }));

        // Soil
        svg.appendChild(svgEl('rect', { x: 0, y: 96, width: W, height: H - 96, fill: 'url(#soil)' }));

        // Soil texture specks
        var specks = [
            [30, 130], [70, 170], [110, 210], [150, 260], [20, 240],
            [200, 160], [260, 200], [300, 250], [350, 180], [410, 220],
            [50, 300], [120, 300], [210, 300], [290, 290], [380, 300],
            [90, 115], [160, 125], [250, 120], [330, 110], [400, 125]
        ];
        specks.forEach(function (p) {
            svg.appendChild(svgEl('circle', {
                cx: p[0], cy: p[1], r: 1.4, fill: '#2B1E10', opacity: '0.35'
            }));
        });

        // Small pebbles
        svg.appendChild(svgEl('ellipse', { cx: 80, cy: 112, rx: 6, ry: 2.3, fill: '#8F7658', opacity: '0.75' }));
        svg.appendChild(svgEl('ellipse', { cx: 340, cy: 112, rx: 7, ry: 2.5, fill: '#8F7658', opacity: '0.75' }));
        svg.appendChild(svgEl('ellipse', { cx: 180, cy: 114, rx: 4, ry: 1.8, fill: '#A88866', opacity: '0.70' }));

        // Soil surface line
        svg.appendChild(svgEl('path', {
            d: 'M 0 96 C 40 94, 100 97, 180 95 C 260 93, 340 97, 460 95',
            stroke: '#3F2C18',
            'stroke-width': 1.2,
            fill: 'none',
            opacity: '0.55'
        }));

        // "JESUS THE GOOD SOIL" text, subtle in deep soil area
        var label1 = svgEl('text', {
            x: W / 2,
            y: 258,
            'text-anchor': 'middle',
            'font-family': 'Playfair Display, Georgia, serif',
            'font-size': 14,
            'font-weight': 700,
            'letter-spacing': '0.20em',
            fill: '#E7D9B9',
            opacity: '0.24'
        });
        label1.textContent = 'JESUS';
        svg.appendChild(label1);

        var label2 = svgEl('text', {
            x: W / 2,
            y: 282,
            'text-anchor': 'middle',
            'font-family': 'Playfair Display, Georgia, serif',
            'font-size': 10,
            'font-weight': 700,
            'letter-spacing': '0.28em',
            fill: '#E7D9B9',
            opacity: '0.22'
        });
        label2.textContent = 'THE GOOD SOIL';
        svg.appendChild(label2);
    }

    function buildSprout(svg, growthLevel) {
        // growthLevel is 0 to 5. Higher = fuller plant.
        var ox = ORIGIN.x;
        var oy = ORIGIN.y;
        var height = 34 + growthLevel * 4;
        var stemTop = oy - height;

        var g = svgEl('g', {});

        // Base mound
        g.appendChild(svgEl('ellipse', {
            cx: ox, cy: oy + 2, rx: 12, ry: 3,
            fill: '#4F3820', opacity: '0.55'
        }));

        // Stem
        g.appendChild(svgEl('path', {
            d: 'M ' + ox + ' ' + oy + ' C ' + (ox - 2) + ' ' + (oy - height * 0.5) + ', ' + (ox + 1) + ' ' + (oy - height * 0.8) + ', ' + ox + ' ' + stemTop,
            stroke: '#3F7A48',
            'stroke-width': 2.5,
            'stroke-linecap': 'round',
            fill: 'none'
        }));

        // Leaves - progressively fuller
        var leafSets = [
            { x: ox - 10, y: oy - 18, side: -1 },
            { x: ox + 10, y: oy - 24, side: 1 },
            { x: ox - 12, y: oy - 32, side: -1 },
            { x: ox + 11, y: oy - 40, side: 1 },
            { x: ox - 8, y: oy - 48, side: -1 }
        ];
        var maxLeaves = Math.max(2, growthLevel + 1);
        leafSets.slice(0, maxLeaves).forEach(function (l) {
            var cx = l.x;
            var cy = l.y;
            var s = l.side;
            var d = 'M ' + ox + ' ' + (cy + 4) +
                ' Q ' + (ox + s * 6) + ' ' + (cy - 1) + ', ' + (cx) + ' ' + (cy - 2) +
                ' Q ' + (cx + s * 2) + ' ' + (cy + 4) + ', ' + ox + ' ' + (cy + 4) + ' Z';
            g.appendChild(svgEl('path', {
                d: d,
                fill: '#5EA062',
                opacity: '0.92'
            }));
            g.appendChild(svgEl('path', {
                d: d,
                fill: 'none',
                stroke: '#2F6E3A',
                'stroke-width': 0.7,
                opacity: '0.55'
            }));
        });

        // Tiny tip bud
        if (growthLevel >= 3) {
            g.appendChild(svgEl('circle', {
                cx: ox, cy: stemTop - 2, r: 2.4,
                fill: '#E2C36A', opacity: '0.92'
            }));
        }

        svg.appendChild(g);
    }

    function buildRoots(svg) {
        // Draw placeholder shadow lines for all roots (faint, to hint at future reveals)
        stops.forEach(function (s, i) {
            if (i > step) {
                svg.appendChild(svgEl('path', {
                    d: s.path,
                    fill: 'none',
                    stroke: 'rgba(255, 240, 210, 0.07)',
                    'stroke-width': 2,
                    'stroke-linecap': 'round',
                    'stroke-dasharray': '2 5'
                }));
            }
        });

        for (var i = 0; i <= step; i++) {
            var s = stops[i];

            // Root halo (soft color glow)
            svg.appendChild(svgEl('path', {
                d: s.path,
                fill: 'none',
                stroke: hexToRgba(s.color, 0.22),
                'stroke-width': 11,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round'
            }));

            // Main root line (tapering look via two strokes)
            var under = svgEl('path', {
                d: s.path,
                fill: 'none',
                stroke: '#2D1B0A',
                'stroke-width': 5.5,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round',
                opacity: '0.85'
            });
            svg.appendChild(under);

            var main = svgEl('path', {
                d: s.path,
                fill: 'none',
                stroke: s.color,
                'stroke-width': 3,
                'stroke-linecap': 'round',
                'stroke-linejoin': 'round'
            });
            svg.appendChild(main);

            if (i === step) {
                animateStroke(under, 80);
                animateStroke(main, 120);
            }

            // Tiny root hairs near the tip
            var tip = s.tip;
            var hairAngles = [30, -15, 60, -45];
            hairAngles.forEach(function (deg, idx) {
                var rad = deg * Math.PI / 180;
                var len = 8 + (idx % 2) * 3;
                var x2 = tip.x + Math.cos(rad) * len;
                var y2 = tip.y + Math.sin(rad) * len;
                svg.appendChild(svgEl('line', {
                    x1: tip.x, y1: tip.y, x2: x2, y2: y2,
                    stroke: s.color,
                    'stroke-width': 1.2,
                    'stroke-linecap': 'round',
                    opacity: '0.85'
                }));
            });

            // Tip node
            svg.appendChild(svgEl('circle', {
                cx: tip.x, cy: tip.y, r: 6,
                fill: hexToRgba(s.color, 0.25)
            }));
            svg.appendChild(svgEl('circle', {
                cx: tip.x, cy: tip.y, r: 4,
                fill: '#FAF5E6',
                stroke: s.color,
                'stroke-width': 2
            }));
        }
    }

    function buildPills(container) {
        var pills = document.createElement('div');
        pills.className = 'stop-pills';
        stops.forEach(function (stop, idx) {
            var pill = document.createElement('div');
            pill.className = 'stop-pill';
            pill.style.setProperty('--pill-color', stop.color);
            if (idx <= step) pill.classList.add('visible');
            pill.textContent = stop.short;
            pills.appendChild(pill);
        });
        container.appendChild(pills);
    }

    function buildIntro(container) {
        var overlay = document.createElement('div');
        overlay.className = 'intro-overlay';
        overlay.innerHTML =
            '<div class="intro-card">' +
                '<p class="intro-verse">"Rooted and built up in him and established in the faith, just as you were taught."</p>' +
                '<p class="intro-ref">Colossians 2:6-7 ESV</p>' +
            '</div>';
        container.appendChild(overlay);
    }

    function buildScene() {
        var scene = document.getElementById('scene');
        scene.innerHTML = '';

        var svg = svgEl('svg', {
            class: 'scene-svg',
            viewBox: '0 0 ' + W + ' ' + H,
            role: 'img',
            'aria-label': 'A small plant with five labeled roots reaching down into rich soil labeled Jesus the Good Soil'
        });

        buildBackdrop(svg);
        buildRoots(svg);
        buildSprout(svg, step + 1);

        scene.appendChild(svg);
        buildPills(scene);
        if (step === -1) buildIntro(scene);
    }

    function buildCard() {
        var area = document.getElementById('cardArea');
        var color = currentColor();
        area.innerHTML = '';
        area.style.setProperty('--card-color', color);

        var card = document.createElement('div');
        card.className = 'verse-card';
        card.innerHTML = '<div class="verse-bar"></div>';

        var content = document.createElement('div');
        content.className = 'verse-content';

        var title = document.createElement('h2');
        title.className = 'verse-title';
        var text = document.createElement('p');
        text.className = 'verse-text';

        if (step === -1) {
            title.textContent = 'Jesus Is the Good Soil';
            text.innerHTML = 'Tap Begin and watch five roots reach down into Jesus, one at a time. Each root is a spiritual discipline that draws life from Him.';
            content.appendChild(title);
            content.appendChild(text);
        } else {
            var s = stops[step];
            title.textContent = s.title;
            text.innerHTML = s.verse + '<span class="card-note">' + s.note + '</span>';
            content.appendChild(title);
            content.appendChild(text);

            var ref = document.createElement('p');
            ref.className = 'verse-ref';
            ref.textContent = s.ref;
            content.appendChild(ref);
        }

        card.appendChild(content);
        area.appendChild(card);
        area.appendChild(buildNav());
    }

    function buildNav() {
        var nav = document.createElement('div');
        nav.className = 'nav';

        var back = document.createElement('button');
        back.type = 'button';
        back.className = 'nav-btn' + (step === -1 ? ' hidden' : '');
        back.innerHTML = '&larr; Back';
        back.addEventListener('click', function () {
            if (step > -1) {
                step -= 1;
                render();
            }
        });
        nav.appendChild(back);

        var dots = document.createElement('div');
        dots.className = 'dots';
        stops.forEach(function (stop, idx) {
            var dot = document.createElement('button');
            dot.type = 'button';
            dot.className = 'dot';
            dot.setAttribute('aria-label', 'Go to ' + stop.title);
            if (idx <= step) {
                dot.classList.add('available');
                dot.style.background = idx === step ? stop.color : hexToRgba(stop.color, 0.42);
                dot.addEventListener('click', function () {
                    step = idx;
                    render();
                });
            }
            if (idx === step) dot.classList.add('current');
            dots.appendChild(dot);
        });
        nav.appendChild(dots);

        var next = document.createElement('button');
        next.type = 'button';
        next.className = 'nav-btn primary';
        next.style.background = currentColor();
        if (step === -1) {
            next.innerHTML = 'Begin &rarr;';
        } else if (step === stops.length - 1) {
            next.innerHTML = '&#8635; Restart';
        } else {
            next.innerHTML = 'Next &rarr;';
        }
        next.addEventListener('click', function () {
            if (step === -1) {
                step = 0;
            } else if (step === stops.length - 1) {
                step = -1;
            } else {
                step += 1;
            }
            render();
        });
        nav.appendChild(next);

        return nav;
    }

    function render() {
        document.documentElement.style.setProperty('--card-color', currentColor());
        buildScene();
        buildCard();
    }

    render();
}());
</script>
</body>
</html>
