<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Someone Draw the 3 Circles</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 0;
            margin: 0;
            font-family: 'Georgia', 'Cambria', serif;
            background: #F8F6F1;
            color: #2C2416;
            -webkit-font-smoothing: antialiased;
        }

        .widget-outer {
            background: #FFFFFF;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            border: none;
            max-width: 100%;
            width: 100%;
            margin: 0;
            position: relative;
        }

        @media (min-width: 560px) {
            body {
                padding: 16px;
                background: #F8F6F1;
            }
            .widget-outer {
                border-radius: 12px;
                box-shadow: 0 6px 20px rgba(44, 36, 22, 0.08);
                border: 1px solid #EBE5D9;
                max-width: 460px;
                margin: 0 auto;
            }
        }

        .title-bar {
            background: #2C2416;
            padding: 6px 14px;
            text-align: center;
        }

        .title-bar h1 {
            font-size: 16px;
            font-weight: 700;
            color: #FAF8F3;
            font-family: Georgia, 'Cambria', serif;
            letter-spacing: 0;
            margin: 0;
            line-height: 1.2;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        .video-wrap video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .caption {
            background: #F6F4EE;
            border-top: 1px solid #EBE5D9;
            padding: 10px 14px 12px;
            text-align: center;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            font-size: 11.5px;
            font-weight: 700;
            color: #6B604F;
            line-height: 1.35;
        }

        .caption strong {
            color: #1E6FA0;
            font-weight: 900;
        }
    </style>
</head>
<body>
<div class="widget-outer">
    <div class="title-bar">
        <h1>Watch Someone Draw the 3 Circles</h1>
    </div>
    <div class="video-wrap">
        <video controls preload="metadata" playsinline>
            <source src="../videos/3_circles_sample_presentation_v4-(360p).mp4" type="video/mp4">
            Your browser cannot play this video. <a href="../videos/3_circles_sample_presentation_v4-(360p).mp4">Download it here</a>.
        </video>
    </div>
    <div class="caption">
        <strong>Tip:</strong> Watch once for the words. Watch again with a pen in hand and try drawing it as the video moves.
    </div>
</div>
</body>
</html>
