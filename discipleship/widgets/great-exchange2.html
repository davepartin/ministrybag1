<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Exchange</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding: 0;
    margin: 0;
    font-family: 'Georgia', 'Cambria', serif;
    background: #F8F6F1;
    color: #2C2416;
    -webkit-font-smoothing: antialiased;
  }

  button { -webkit-tap-highlight-color: transparent; }

  .widget-outer {
    background: #FFFFFF;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    border: none;
    max-width: 100%;
    width: 100%;
    margin: 0;
    position: relative;
  }

  @media (min-width: 560px) {
    body {
      padding: 16px;
      background: #F8F6F1;
    }
    .widget-outer {
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(44, 36, 22, 0.08);
      border: 1px solid #EBE5D9;
      max-width: 460px;
      margin: 0 auto;
    }
  }

  .title-bar {
    background: #2C2416;
    padding: 6px 14px;
    text-align: center;
  }

  .title-bar h1 {
    font-size: 18px;
    font-weight: 600;
    color: #FAF8F3;
    font-family: 'Playfair Display', Georgia, serif;
    letter-spacing: 0.3px;
    margin: 0;
    line-height: 1.15;
  }

  .diagram-wrapper {
    height: 292px;
    padding: 6px 0 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(180deg, #FFFFFF 0%, #FBFAF6 100%);
  }

  .diagram-container {
    position: relative;
    width: 350px;
    height: 286px;
    overflow: hidden;
  }

  .diagram-container svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .caption-pill {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 178px;
    max-width: 280px;
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid #E7E0D2;
    box-shadow: 0 6px 14px rgba(44, 36, 22, 0.08);
    color: #2C2416;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.18;
    text-align: center;
    pointer-events: none;
  }

  .anchor-banner {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 270px;
    max-width: 310px;
    padding: 11px 18px;
    border-radius: 10px;
    background: linear-gradient(135deg, #E6C66A 0%, #C9A544 100%);
    color: #2C2416;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14px;
    font-weight: 700;
    font-style: italic;
    line-height: 1.25;
    text-align: center;
    box-shadow: 0 6px 18px rgba(201, 165, 68, 0.35);
    animation: anchorRise 0.55s ease;
    pointer-events: none;
  }

  #card-area {
    background-color: #F6F4EE;
    border-top: 1px solid #EBE5D9;
    padding-top: 8px;
  }

  .verse-card-wrapper {
    margin: 0 auto;
    padding: 0 12px 8px;
  }

  .verse-card {
    background: #FFFFFF;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 14px rgba(44, 36, 22, 0.06);
    animation: fadeSlide 0.35s ease;
  }

  .verse-card-bar {
    height: 4px;
  }

  .verse-card-content {
    padding: 10px 16px;
    height: 112px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .verse-card-title {
    font-size: 15px;
    font-weight: 700;
    color: #5A4E3C;
    margin: 0 0 4px 0;
    line-height: 1.22;
    font-family: 'Playfair Display', Georgia, serif;
  }

  .verse-card-text {
    font-size: 13px;
    line-height: 1.36;
    color: #3D3426;
    margin: 0 0 4px 0;
    flex-grow: 1;
  }

  .verse-card-text i {
    color: var(--accent-color, #1A6B55);
  }

  .verse-card-ref {
    font-size: 11px;
    color: var(--accent-color, #1A6B55);
    margin: 0;
    font-weight: 600;
    font-family: 'Trebuchet MS', sans-serif;
  }

  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 0 2px;
  }

  .nav-btn {
    background: transparent;
    border: 1.5px solid #D4CFC4;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12px;
    font-family: 'Trebuchet MS', sans-serif;
    cursor: pointer;
    font-weight: 600;
  }

  .nav-btn.primary {
    color: #fff;
    border: none;
  }

  .nav-btn:disabled {
    color: #CCC5B8;
    cursor: default;
  }

  .dot-nav {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    height: 7px;
    border-radius: 4px;
    transition: all 0.3s ease;
    cursor: default;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes anchorRise {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @keyframes chipTravel {
    from { opacity: 0; transform: scale(0.75); }
    40%  { opacity: 1; transform: scale(1.05); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="widget-outer">
  <div class="title-bar">
    <h1>The Great Exchange</h1>
  </div>

  <div class="diagram-wrapper">
    <div class="diagram-container" id="diagram"></div>
  </div>

  <div id="card-area"></div>
</div>

<script>
/* ============================================================
   Slide data
   Each slide is one tap. Phase governs visual state.
   ============================================================ */
var slides = [
  {
    id: 'intro',
    phase: 'intro',
    title: 'The Cross Between You and Christ',
    caption: 'Tap Next to begin the exchange',
    color: '#5A4E3C',
    ref: 'Romans 5:8',
    text: 'Two figures. One cross. Everything He takes and everything He gives passes through it.'
  },
  {
    id: 'take-sin',
    phase: 'takes',
    chip: 'my sin',
    title: 'He Takes Your Sin',
    caption: 'Your sin is placed on Jesus',
    color: '#7A4B42',
    ref: '2 Corinthians 5:21',
    text: '<i>For our sake he made him to be sin who knew no sin.</i>'
  },
  {
    id: 'take-shame',
    phase: 'takes',
    chip: 'my shame',
    title: 'He Carries Your Shame',
    caption: 'Your shame is laid on Him',
    color: '#7A4B42',
    ref: 'Isaiah 53:4',
    text: '<i>Surely he has borne our griefs and carried our sorrows.</i>'
  },
  {
    id: 'take-old-self',
    phase: 'takes',
    chip: 'my old self',
    title: 'Your Old Self Dies With Him',
    caption: 'The old you is crucified with Christ',
    color: '#7A4B42',
    ref: 'Galatians 2:20',
    text: '<i>I have been crucified with Christ. It is no longer I who live.</i>'
  },
  {
    id: 'take-record',
    phase: 'takes',
    chip: 'my record',
    title: 'He Cancels Your Record',
    caption: 'Your record is nailed to the cross',
    color: '#7A4B42',
    ref: 'Colossians 2:14',
    text: '<i>He canceled the record of debt that stood against us, nailing it to the cross.</i>'
  },
  {
    id: 'give-righteousness',
    phase: 'gives',
    chip: 'His righteousness',
    title: 'He Gives His Righteousness',
    caption: 'His right standing is counted to you',
    color: '#1A6B55',
    ref: '2 Corinthians 5:21',
    text: '<i>So that in him we might become the righteousness of God.</i>'
  },
  {
    id: 'give-sonship',
    phase: 'gives',
    chip: 'His sonship',
    title: 'He Gives His Sonship',
    caption: 'You are welcomed into the Father\u2019s family',
    color: '#1A6B55',
    ref: 'John 1:12',
    text: '<i>To all who did receive him, he gave the right to become children of God.</i>'
  },
  {
    id: 'give-life',
    phase: 'gives',
    chip: 'His new life',
    title: 'He Gives His New Life',
    caption: 'The old has passed, the new has come',
    color: '#1A6B55',
    ref: '2 Corinthians 5:17',
    text: '<i>If anyone is in Christ, he is a new creation.</i>'
  },
  {
    id: 'give-robe',
    phase: 'gives',
    chip: 'His robe',
    title: 'He Clothes You in Himself',
    caption: 'The robe from the last lesson was always Him',
    color: '#1A6B55',
    ref: 'Galatians 3:27',
    text: '<i>As many of you as were baptized into Christ have put on Christ.</i>'
  },
  {
    id: 'final',
    phase: 'final',
    title: 'Found in Him',
    caption: 'Not a righteousness of your own',
    color: '#C9A544',
    ref: 'Philippians 3:9',
    text: 'Your sin went to the cross. His righteousness came to you. You are found in Him.',
    anchor: 'You stand before God wearing Christ.'
  }
];

var step = 0;
var NS = 'http://www.w3.org/2000/svg';

/* ============================================================
   SVG helpers
   ============================================================ */
function svgEl(tag, attrs) {
  var el = document.createElementNS(NS, tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function addPath(parent, d, stroke, width, fill, opacity) {
  parent.appendChild(svgEl('path', {
    d: d,
    fill: fill || 'none',
    stroke: stroke,
    'stroke-width': width,
    'stroke-linecap': 'round',
    'stroke-linejoin': 'round',
    opacity: opacity == null ? 1 : opacity
  }));
}

function addLine(parent, x1, y1, x2, y2, stroke, width, opacity) {
  parent.appendChild(svgEl('line', {
    x1: x1, y1: y1, x2: x2, y2: y2,
    stroke: stroke, 'stroke-width': width,
    'stroke-linecap': 'round',
    opacity: opacity == null ? 1 : opacity
  }));
}

function addText(parent, text, x, y, color, size, weight) {
  var el = svgEl('text', {
    x: x, y: y,
    fill: color,
    'font-family': 'Trebuchet MS, sans-serif',
    'font-size': size,
    'font-weight': weight || 700,
    'text-anchor': 'middle'
  });
  el.textContent = text;
  parent.appendChild(el);
}

/* Brightness progression for the "you" figure across the ten slides.
   Intro is dim. Takes peel burdens off but don't clothe.
   Gives progressively clothe. Final is full light. */
function youBrightness(s) {
  if (s === 0) return 0.30;
  if (s <= 4) return 0.36 + (s - 1) * 0.04;   // 0.36, 0.40, 0.44, 0.48
  if (s <= 8) return 0.58 + (s - 5) * 0.10;   // 0.58, 0.68, 0.78, 0.88
  return 1.00;
}

/* ============================================================
   Figure drawing
   brightness 0 -> silhouette-dark, 1 -> bright-white-robe
   ============================================================ */
function drawFigure(parent, x, y, brightness, isChrist) {
  var g = svgEl('g', {});

  // Interpolate robe colors based on brightness
  function mix(a, b, t) {
    return Math.round(a + (b - a) * t);
  }
  function hex(r, gC, bC) {
    return 'rgb(' + r + ',' + gC + ',' + bC + ')';
  }

  var robeFill, robeStroke, headFill, headStroke, haloColor, haloOp;

  if (isChrist) {
    robeFill = '#FDFBF2';
    robeStroke = '#D7C88A';
    headFill = '#F4D9B8';
    headStroke = '#8A6A4C';
    haloColor = '#E6C66A';
    haloOp = 0.22;
  } else {
    // You: interpolate dark slate -> warm light
    var t = brightness;
    var r = mix(58, 252, t);
    var gC = mix(54, 248, t);
    var bC = mix(62, 236, t);
    robeFill = hex(r, gC, bC);
    var sr = mix(28, 215, t);
    var sg = mix(26, 200, t);
    var sb = mix(32, 138, t);
    robeStroke = hex(sr, sg, sb);
    headFill = t > 0.6 ? '#F0D0AE' : '#B8957A';
    headStroke = t > 0.6 ? '#8A6A4C' : '#4A3A2C';
    haloColor = '#E6C66A';
    haloOp = brightness >= 1.0 ? 0.22 : 0;
  }

  // Halo / glow
  if (haloOp > 0) {
    g.appendChild(svgEl('circle', { cx: x, cy: y - 68, r: 32, fill: haloColor, opacity: haloOp }));
    g.appendChild(svgEl('circle', { cx: x, cy: y - 68, r: 22, fill: haloColor, opacity: haloOp * 0.7 }));
  }

  // Head
  g.appendChild(svgEl('circle', {
    cx: x, cy: y - 68, r: 15,
    fill: headFill, stroke: headStroke, 'stroke-width': 2
  }));

  // Hair suggestion for Christ
  if (isChrist) {
    addPath(g,
      'M' + (x - 12) + ' ' + (y - 76) +
      ' C' + (x - 6) + ' ' + (y - 88) + ' ' + (x + 10) + ' ' + (y - 86) + ' ' + (x + 14) + ' ' + (y - 72),
      '#7C5A42', 2.5, 'none', 0.55);
  }

  // Neck
  addLine(g, x - 5, y - 52, x - 5, y - 44, headStroke, 2, 0.55);
  addLine(g, x + 5, y - 52, x + 5, y - 44, headStroke, 2, 0.55);

  // Robe body (trapezoid with subtle draping)
  var robe =
    'M' + (x - 26) + ' ' + (y - 44) +
    ' C' + (x - 12) + ' ' + (y - 32) + ' ' + (x + 12) + ' ' + (y - 32) + ' ' + (x + 26) + ' ' + (y - 44) +
    ' L' + (x + 48) + ' ' + (y - 18) +
    ' L' + (x + 34) + ' ' + (y - 4) +
    ' L' + (x + 38) + ' ' + (y + 60) +
    ' L' + (x - 38) + ' ' + (y + 60) +
    ' L' + (x - 34) + ' ' + (y - 4) +
    ' L' + (x - 48) + ' ' + (y - 18) +
    ' Z';
  addPath(g, robe, robeStroke, 2.4, robeFill, 1);

  // Robe drape lines
  addPath(g, 'M' + (x - 12) + ' ' + (y - 22) +
    ' C' + (x - 8) + ' ' + (y + 10) + ' ' + (x - 10) + ' ' + (y + 36) + ' ' + (x - 16) + ' ' + (y + 58),
    robeStroke, 1.4, 'none', 0.35);
  addPath(g, 'M' + (x + 12) + ' ' + (y - 22) +
    ' C' + (x + 8) + ' ' + (y + 10) + ' ' + (x + 10) + ' ' + (y + 36) + ' ' + (x + 16) + ' ' + (y + 58),
    robeStroke, 1.4, 'none', 0.35);

  // Golden trim hint for full brightness or christ
  if (brightness >= 1.0 || isChrist) {
    addPath(g, 'M' + (x - 26) + ' ' + (y - 44) +
      ' C' + (x - 12) + ' ' + (y - 32) + ' ' + (x + 12) + ' ' + (y - 32) + ' ' + (x + 26) + ' ' + (y - 44),
      '#C9A544', 1.8, 'none', 0.7);
    addLine(g, x - 38, y + 59, x + 38, y + 59, '#C9A544', 1.6, 0.6);
  }

  parent.appendChild(g);
}

/* ============================================================
   Cross drawing
   state: 'dim', 'takes', 'gives', 'glory'
   ============================================================ */
function drawCross(parent, state) {
  var color, glow, glowColor;
  if (state === 'dim') { color = '#9B8F7A'; glow = 0; glowColor = null; }
  else if (state === 'takes') { color = '#5A3A33'; glow = 0.18; glowColor = '#7A4B42'; }
  else if (state === 'gives') { color = '#6A4A35'; glow = 0.22; glowColor = '#C9A544'; }
  else { color = '#8A6A35'; glow = 0.35; glowColor = '#E6C66A'; }

  if (glow > 0) {
    parent.appendChild(svgEl('circle', {
      cx: 175, cy: 130, r: 54,
      fill: glowColor, opacity: glow
    }));
    parent.appendChild(svgEl('circle', {
      cx: 175, cy: 130, r: 34,
      fill: glowColor, opacity: glow * 0.6
    }));
  }

  // vertical beam
  addLine(parent, 175, 85, 175, 218, color, 10, 1);
  // horizontal beam
  addLine(parent, 137, 124, 213, 124, color, 10, 1);
  // subtle wood grain
  addLine(parent, 175, 90, 175, 215, '#3A2A1F', 2, 0.35);
  addLine(parent, 140, 124, 210, 124, '#3A2A1F', 2, 0.3);
}

/* ============================================================
   Chip drawing (the traveling label)
   ============================================================ */
function drawChip(parent, cx, cy, label, kind) {
  var g = svgEl('g', {});
  g.setAttribute('class', 'chip');

  var fill, stroke, textColor;
  if (kind === 'take') {
    fill = '#2C2018';
    stroke = '#7A4B42';
    textColor = '#FDECE6';
  } else if (kind === 'give') {
    fill = '#FDFBF2';
    stroke = '#1A6B55';
    textColor = '#1A6B55';
  } else {
    fill = '#FFF7D6';
    stroke = '#C9A544';
    textColor = '#5A3A10';
  }

  // Measure text roughly for pill width
  var w = Math.max(64, label.length * 6.8 + 22);
  var h = 22;
  parent.appendChild(svgEl('defs', {}));

  var rect = svgEl('rect', {
    x: cx - w / 2, y: cy - h / 2,
    width: w, height: h,
    rx: 11, ry: 11,
    fill: fill, stroke: stroke,
    'stroke-width': 1.5
  });
  g.appendChild(rect);

  addText(g, label, cx, cy + 4, textColor, 11, 700);
  parent.appendChild(g);
  return g;
}

/* ============================================================
   Arrow drawing for the traveling path
   ============================================================ */
function drawArrowPath(parent, d, color, opacity) {
  addPath(parent, d, color, 2.6, 'none', opacity == null ? 0.7 : opacity);
}

/* ============================================================
   Main diagram draw
   ============================================================ */
function drawDiagram() {
  var cur = slides[step];
  var diagram = document.getElementById('diagram');
  diagram.innerHTML = '';

  var svg = svgEl('svg', {
    viewBox: '0 0 350 286',
    width: '100%', height: '100%',
    role: 'img', 'aria-label': cur.caption
  });

  // Background tone (progresses lighter)
  var defs = svgEl('defs', {});
  var grad = svgEl('linearGradient', { id: 'bgGrad', x1: '0', y1: '0', x2: '0', y2: '1' });
  var topColor = cur.phase === 'final' ? '#FFF9E6' :
                 cur.phase === 'gives' ? '#FEFBF0' :
                 cur.phase === 'takes' ? '#FAF7EE' : '#FFFFFF';
  grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': topColor }));
  grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#FBFAF6' }));
  defs.appendChild(grad);
  svg.appendChild(defs);

  svg.appendChild(svgEl('rect', { x: 0, y: 0, width: 350, height: 286, fill: 'url(#bgGrad)' }));

  // ground line
  addLine(svg, 28, 246, 322, 246, '#E5DED2', 2.4, 0.7);

  // cross state
  var crossState = cur.phase === 'intro' ? 'dim' :
                   cur.phase === 'takes' ? 'takes' :
                   cur.phase === 'gives' ? 'gives' : 'glory';
  drawCross(svg, crossState);

  // figures
  drawFigure(svg, 78, 172, youBrightness(step), false);
  drawFigure(svg, 272, 172, 1, true);

  // base labels under feet
  addText(svg, 'you', 78, 265, '#5A4E3C', 12, 700);
  addText(svg, 'Christ', 272, 265, '#5A4E3C', 12, 700);

  // chip and arrows for this step
  if (cur.phase === 'takes') {
    // arrow from you chest through cross (arc downward-through)
    // Burden leaves you and is absorbed at the cross
    drawArrowPath(svg,
      'M108 150 C135 128 158 126 175 140',
      '#7A4B42', 0.6);
    drawChip(svg, 160, 120, cur.chip, 'take');
  } else if (cur.phase === 'gives') {
    // arrow from christ through cross to you (arc upward)
    drawArrowPath(svg,
      'M242 148 C215 128 135 128 108 148',
      '#1A6B55', 0.7);
    drawChip(svg, 190, 115, cur.chip, 'give');
  } else if (cur.phase === 'final') {
    // Golden light rays between figures
    drawArrowPath(svg, 'M108 150 C150 120 200 120 242 150', '#C9A544', 0.55);
    drawArrowPath(svg, 'M108 170 C150 200 200 200 242 170', '#C9A544', 0.35);
  }

  diagram.appendChild(svg);

  // Caption pill (not shown on final - anchor banner takes over)
  if (cur.phase !== 'final') {
    var pill = document.createElement('div');
    pill.className = 'caption-pill';
    pill.style.borderColor = cur.color + '55';
    pill.style.boxShadow = '0 6px 14px ' + cur.color + '1F';
    pill.textContent = cur.caption;
    diagram.appendChild(pill);
  }

  // Anchor banner at final
  if (cur.anchor) {
    var banner = document.createElement('div');
    banner.className = 'anchor-banner';
    banner.textContent = cur.anchor;
    diagram.appendChild(banner);
  }
}

/* ============================================================
   Card render
   ============================================================ */
function renderCard() {
  var cur = slides[step];
  var cardArea = document.getElementById('card-area');
  cardArea.innerHTML = '';

  var wrapper = document.createElement('div');
  wrapper.className = 'verse-card-wrapper';

  var card = document.createElement('div');
  card.className = 'verse-card';

  var bar = document.createElement('div');
  bar.className = 'verse-card-bar';
  bar.style.background = cur.color;

  var content = document.createElement('div');
  content.className = 'verse-card-content';
  content.style.setProperty('--accent-color', cur.color);

  var title = document.createElement('h2');
  title.className = 'verse-card-title';
  title.style.color = cur.color;
  title.textContent = cur.title;

  var text = document.createElement('p');
  text.className = 'verse-card-text';
  text.innerHTML = cur.text;

  var ref = document.createElement('p');
  ref.className = 'verse-card-ref';
  ref.textContent = cur.ref;

  content.appendChild(title);
  content.appendChild(text);
  content.appendChild(ref);
  card.appendChild(bar);
  card.appendChild(content);
  wrapper.appendChild(card);
  wrapper.appendChild(buildNav(cur.color));
  cardArea.appendChild(wrapper);
}

function buildNav(color) {
  var nav = document.createElement('div');
  nav.className = 'nav-bar';

  var back = document.createElement('button');
  back.className = 'nav-btn';
  back.textContent = '\u2190 Back';
  back.disabled = step === 0;
  back.style.color = step === 0 ? '#CCC5B8' : '#5A4E3C';
  back.addEventListener('click', function() {
    step = Math.max(0, step - 1);
    render();
  });
  nav.appendChild(back);

  var dots = document.createElement('div');
  dots.className = 'dot-nav';
  slides.forEach(function(slide, idx) {
    var dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.width = step === idx ? '18px' : '7px';
    var c = slides[idx].color;
    dot.style.background = step === idx ? c : (idx < step ? c + '80' : '#D4CFC4');
    if (idx <= step) {
      dot.style.cursor = 'pointer';
      dot.addEventListener('click', function() {
        step = idx;
        render();
      });
    }
    dots.appendChild(dot);
  });
  nav.appendChild(dots);

  var next = document.createElement('button');
  next.className = 'nav-btn primary';
  next.textContent = step === slides.length - 1 ? '\u21BB Restart' : 'Next \u2192';
  next.style.background = color;
  next.style.boxShadow = '0 2px 8px ' + color + '33';
  next.addEventListener('click', function() {
    step = step === slides.length - 1 ? 0 : Math.min(slides.length - 1, step + 1);
    render();
  });
  nav.appendChild(next);

  return nav;
}

function render() {
  drawDiagram();
  renderCard();
}

render();
</script>
</body>
</html>
