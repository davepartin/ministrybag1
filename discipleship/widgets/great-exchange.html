<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Exchange</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 0;
            margin: 0;
            font-family: 'Georgia', 'Cambria', serif;
            background: #F8F6F1;
            color: #2C2416;
            -webkit-font-smoothing: antialiased;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .widget-outer {
            background: #FFFFFF;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            border: none;
            max-width: 100%;
            width: 100%;
            margin: 0;
            position: relative;
        }

        @media (min-width: 560px) {
            body {
                padding: 16px;
                background: #F8F6F1;
            }
            .widget-outer {
                border-radius: 12px;
                box-shadow: 0 6px 20px rgba(44, 36, 22, 0.08);
                border: 1px solid #EBE5D9;
                max-width: 460px;
                margin: 0 auto;
            }
        }

        .title-bar {
            background: #2C2416;
            padding: 6px 14px;
            text-align: center;
        }

        .title-bar h1 {
            font-size: 18px;
            font-weight: 600;
            color: #FAF8F3;
            font-family: 'Playfair Display', Georgia, serif;
            letter-spacing: 0.3px;
            margin: 0;
            line-height: 1.15;
        }

        .diagram-wrapper {
            height: 292px;
            padding: 6px 0 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(180deg, #FFFFFF 0%, #FBFAF6 100%);
        }

        .diagram-container {
            position: relative;
            width: 350px;
            height: 286px;
            overflow: hidden;
        }

        .diagram-container svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .caption-pill {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 178px;
            max-width: 270px;
            padding: 7px 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #E7E0D2;
            box-shadow: 0 6px 14px rgba(44, 36, 22, 0.08);
            color: #2C2416;
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.18;
            text-align: center;
            pointer-events: none;
        }

        #card-area {
            background-color: #F6F4EE;
            border-top: 1px solid #EBE5D9;
            padding-top: 8px;
        }

        .verse-card-wrapper {
            margin: 0 auto;
            padding: 0 12px 8px;
        }

        .verse-card {
            background: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 14px rgba(44,36,22,0.06);
            animation: fadeSlide 0.35s ease;
        }

        .verse-card-bar {
            height: 4px;
        }

        .verse-card-content {
            padding: 10px 16px;
            height: 112px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .verse-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #5A4E3C;
            margin: 0 0 4px 0;
            line-height: 1.22;
            font-family: 'Playfair Display', Georgia, serif;
        }

        .verse-card-text {
            font-size: 13px;
            line-height: 1.36;
            color: #3D3426;
            margin: 0 0 4px 0;
            flex-grow: 1;
        }

        .verse-card-text b {
            color: var(--accent-color, #1A6B55);
        }

        .verse-card-ref {
            font-size: 11px;
            color: var(--accent-color, #1A6B55);
            margin: 0;
            font-weight: 600;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 2px;
        }

        .nav-btn {
            background: transparent;
            border: 1.5px solid #D4CFC4;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            font-family: 'Trebuchet MS', sans-serif;
            cursor: pointer;
            font-weight: 600;
        }

        .nav-btn.primary {
            color: #fff;
            border: none;
        }

        .nav-btn:disabled {
            color: #CCC5B8;
            cursor: default;
        }

        .dot-nav {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            height: 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: default;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="widget-outer">
    <div class="title-bar">
        <h1>The Great Exchange</h1>
    </div>

    <div class="diagram-wrapper">
        <div class="diagram-container" id="diagram"></div>
    </div>

    <div id="card-area"></div>
</div>

<script>
var slides = [
    {
        id: 'darkness',
        title: 'We Stand in Our Sin',
        caption: 'Our rags: sin and shame',
        color: '#4A4A46',
        ref: 'Romans 3:23',
        text: 'Apart from Jesus, we are covered in our own sin and shame. We cannot make ourselves clean.'
    },
    {
        id: 'perfect-life',
        title: 'Jesus Has No Sin',
        caption: 'His robe: perfect righteousness',
        color: '#1A6B55',
        ref: 'Hebrews 4:15',
        text: 'Jesus lived the life we could not live. His white robe pictures perfect righteousness without stain.'
    },
    {
        id: 'takes-sin',
        title: 'Jesus Takes Our Darkness',
        caption: 'Our sin is counted to Him',
        color: '#7A4B42',
        ref: '2 Corinthians 5:21',
        text: 'At the cross, God placed our sin on Jesus. The sin was ours, but He willingly carried it for us.'
    },
    {
        id: 'cross',
        title: 'He Pays for It',
        caption: 'The cross absorbs the debt',
        color: '#8A5A2D',
        ref: '1 Peter 2:24',
        text: 'Jesus bore our sins in His body on the tree. He did not ignore our darkness; He paid for it with His life.'
    },
    {
        id: 'resurrection',
        title: 'He Rises in Victory',
        caption: 'Sin paid. Death defeated.',
        color: '#9B7B2F',
        ref: 'Romans 4:25',
        text: 'The resurrection announces that the payment was accepted. Jesus is alive, and the old verdict no longer gets the final word.'
    },
    {
        id: 'receive',
        title: 'We Receive His Righteousness',
        caption: 'His perfection is counted to us',
        color: '#4A6B8B',
        ref: 'Philippians 3:9',
        text: 'By faith, we are clothed in a righteousness not our own. God sees Christ covering us.'
    },
    {
        id: 'in-christ',
        title: 'Righteous in Christ',
        caption: 'No longer I, but Christ lives in me.',
        color: '#1A6B55',
        ref: 'Galatians 2:20',
        text: 'This is your new identity: Jesus took your sin, gave you His righteousness, and now Christ lives in you.'
    }
];

var step = 0;
var NS = 'http://www.w3.org/2000/svg';
var MUTED = '#D4CFC4';
var DARK = '#252525';
var WHITE = '#FFFDF7';

function svgEl(tag, attrs) {
    var el = document.createElementNS(NS, tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
}

function addPath(parent, d, stroke, width, fill, opacity) {
    parent.appendChild(svgEl('path', {
        d: d,
        fill: fill || 'none',
        stroke: stroke,
        'stroke-width': width,
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
        opacity: opacity == null ? 1 : opacity
    }));
}

function addLine(parent, x1, y1, x2, y2, stroke, width, opacity) {
    parent.appendChild(svgEl('line', {
        x1: x1, y1: y1, x2: x2, y2: y2,
        stroke: stroke, 'stroke-width': width, 'stroke-linecap': 'round',
        opacity: opacity == null ? 1 : opacity
    }));
}

function addText(parent, text, x, y, color, size, weight) {
    var el = svgEl('text', {
        x: x,
        y: y,
        fill: color,
        'font-family': 'Trebuchet MS, sans-serif',
        'font-size': size,
        'font-weight': weight || 700,
        'text-anchor': 'middle'
    });
    el.textContent = text;
    parent.appendChild(el);
}

function drawArrow(parent, x1, y1, x2, y2, color, opacity, curve) {
    var d = curve || ('M' + x1 + ' ' + y1 + ' L' + x2 + ' ' + y2);
    addPath(parent, d, color, 3.2, 'none', opacity);
    var angle = Math.atan2(y2 - y1, x2 - x1);
    var head = 8;
    var p1x = x2 - Math.cos(angle - 0.7) * head;
    var p1y = y2 - Math.sin(angle - 0.7) * head;
    var p2x = x2 - Math.cos(angle + 0.7) * head;
    var p2y = y2 - Math.sin(angle + 0.7) * head;
    parent.appendChild(svgEl('polygon', {
        points: x2 + ',' + y2 + ' ' + p1x + ',' + p1y + ' ' + p2x + ',' + p2y,
        fill: color,
        opacity: opacity == null ? 1 : opacity
    }));
}

function drawRobe(parent, x, y, fill, stroke, label, labelColor, kind, opacity) {
    var g = svgEl('g', { opacity: opacity == null ? 1 : opacity });
    var labelSize = label.length > 9 ? 8.5 : (label.length > 5 ? 10 : 12);
    var bottom = kind === 'rags'
        ? ' L' + (x + 23) + ' ' + (y + 77) + ' L' + (x + 11) + ' ' + (y + 66) + ' L' + (x - 3) + ' ' + (y + 79) + ' L' + (x - 16) + ' ' + (y + 65) + ' L' + (x - 32) + ' ' + (y + 77)
        : ' L' + (x + 35) + ' ' + (y + 78) + ' L' + (x - 35) + ' ' + (y + 78);

    addPath(g,
        'M' + (x - 26) + ' ' + (y - 44) +
        ' C' + (x - 12) + ' ' + (y - 31) + ' ' + (x + 12) + ' ' + (y - 31) + ' ' + (x + 26) + ' ' + (y - 44) +
        ' L' + (x + 51) + ' ' + (y - 14) +
        ' L' + (x + 35) + ' ' + (y + 3) +
        ' L' + (x + 25) + ' ' + (y - 8) +
        bottom +
        ' L' + (x - 25) + ' ' + (y - 8) +
        ' L' + (x - 35) + ' ' + (y + 3) +
        ' L' + (x - 51) + ' ' + (y - 14) +
        ' Z',
        stroke, 2.6, fill, 1);
    addPath(g, 'M' + (x - 13) + ' ' + (y - 34) + ' C' + (x - 6) + ' ' + (y - 25) + ' ' + (x + 6) + ' ' + (y - 25) + ' ' + (x + 13) + ' ' + (y - 34), stroke, 2, 'none', 0.72);
    addPath(g, 'M' + (x - 14) + ' ' + (y - 10) + ' C' + (x - 5) + ' ' + (y + 16) + ' ' + (x - 7) + ' ' + (y + 46) + ' ' + (x - 17) + ' ' + (y + 73), stroke, 1.6, 'none', 0.35);
    addPath(g, 'M' + (x + 14) + ' ' + (y - 10) + ' C' + (x + 5) + ' ' + (y + 16) + ' ' + (x + 7) + ' ' + (y + 46) + ' ' + (x + 17) + ' ' + (y + 73), stroke, 1.6, 'none', 0.35);
    if (kind === 'rags') {
        addPath(g, 'M' + (x - 28) + ' ' + (y + 16) + ' L' + (x + 19) + ' ' + (y + 47), '#5F5A52', 2, 'none', 0.38);
        addPath(g, 'M' + (x + 26) + ' ' + (y + 7) + ' L' + (x - 13) + ' ' + (y + 54), '#5F5A52', 2, 'none', 0.3);
    }
    addText(g, label, x, y + 30, labelColor, labelSize, 800);
    parent.appendChild(g);
    return g;
}

function drawLooseCloth(parent, x, y, fill, stroke, label, labelColor, opacity) {
    var g = svgEl('g', { opacity: opacity == null ? 1 : opacity });
    addPath(g,
        'M' + (x - 46) + ' ' + (y - 18) +
        ' C' + (x - 20) + ' ' + (y - 39) + ' ' + (x + 13) + ' ' + (y - 31) + ' ' + (x + 43) + ' ' + (y - 14) +
        ' C' + (x + 25) + ' ' + (y + 1) + ' ' + (x + 24) + ' ' + (y + 25) + ' ' + (x + 37) + ' ' + (y + 43) +
        ' C' + (x + 4) + ' ' + (y + 31) + ' ' + (x - 15) + ' ' + (y + 42) + ' ' + (x - 45) + ' ' + (y + 25) +
        ' C' + (x - 34) + ' ' + (y + 13) + ' ' + (x - 31) + ' ' + (y - 4) + ' ' + (x - 46) + ' ' + (y - 18) +
        ' Z',
        stroke, 2.5, fill, 1);
    addPath(g, 'M' + (x - 22) + ' ' + (y - 15) + ' C' + (x - 1) + ' ' + (y - 3) + ' ' + (x + 15) + ' ' + (y + 10) + ' ' + (x + 25) + ' ' + (y + 30), stroke, 1.8, 'none', 0.42);
    addText(g, label, x, y + 14, labelColor, 10, 800);
    parent.appendChild(g);
}

function drawPerson(parent, x, y, robeKind, label, glow, dim) {
    var op = dim ? 0.36 : 1;
    var g = svgEl('g', { opacity: op });
    var fill = robeKind === 'rags' ? DARK : (robeKind === 'plain' ? '#EFEAE0' : WHITE);
    var stroke = robeKind === 'rags' ? '#151515' : (robeKind === 'plain' ? '#CFC6B7' : '#D7CBAF');
    var labelColor = robeKind === 'rags' ? '#FFFFFF' : (robeKind === 'plain' ? '#8C8375' : '#1A6B55');
    if (glow) {
        g.appendChild(svgEl('circle', { cx: x, cy: y - 46, r: 42, fill: glow, opacity: 0.18 }));
        g.appendChild(svgEl('circle', { cx: x, cy: y - 46, r: 30, fill: glow, opacity: 0.14 }));
    }
    g.appendChild(svgEl('circle', { cx: x, cy: y - 78, r: 18, fill: '#F0D4B8', stroke: '#7C5A42', 'stroke-width': 2 }));
    addPath(g, 'M' + (x - 13) + ' ' + (y - 88) + ' C' + (x - 4) + ' ' + (y - 101) + ' ' + (x + 15) + ' ' + (y - 95) + ' ' + (x + 16) + ' ' + (y - 80), '#6A4A35', 3, 'none', 0.7);
    addLine(g, x - 8, y - 56, x - 8, y - 44, '#7C5A42', 2, 0.55);
    addLine(g, x + 8, y - 56, x + 8, y - 44, '#7C5A42', 2, 0.55);
    drawRobe(g, x, y - 16, fill, stroke, label, labelColor, robeKind, 1);
    addLine(g, x - 18, y + 31, x - 24, y + 69, '#7C5A42', 3, 0.72);
    addLine(g, x + 18, y + 31, x + 24, y + 69, '#7C5A42', 3, 0.72);
    addLine(g, x - 35, y + 69, x - 18, y + 69, '#7C5A42', 3, 0.65);
    addLine(g, x + 18, y + 69, x + 35, y + 69, '#7C5A42', 3, 0.65);
    parent.appendChild(g);
}

function drawCross(parent, active, risen) {
    var color = active ? '#7A4B42' : MUTED;
    var op = active ? 1 : 0.35;
    addLine(parent, 175, 89, 175, 226, color, 12, op);
    addLine(parent, 129, 128, 221, 128, color, 12, op);
    if (active) {
        parent.appendChild(svgEl('circle', { cx: 175, cy: 126, r: risen ? 70 : 58, fill: risen ? '#D7B85A' : '#7A4B42', opacity: risen ? 0.14 : 0.08 }));
    }
}

function drawDiagram() {
    var cur = slides[step];
    var diagram = document.getElementById('diagram');
    diagram.innerHTML = '';

    var svg = svgEl('svg', { viewBox: '0 0 350 286', width: '100%', height: '100%', role: 'img', 'aria-label': cur.caption });
    var defs = svgEl('defs', {});
    var grad = svgEl('linearGradient', { id: 'goldWash', x1: '0', y1: '0', x2: '0', y2: '1' });
    grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#FFF7D6' }));
    grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#F8F6F1' }));
    defs.appendChild(grad);
    svg.appendChild(defs);

    svg.appendChild(svgEl('rect', { x: 0, y: 0, width: 350, height: 286, fill: step >= 4 ? 'url(#goldWash)' : '#FFFFFF' }));
    addLine(svg, 28, 244, 322, 244, '#E5DED2', 3, 0.7);

    var crossActive = step >= 3;
    drawCross(svg, crossActive, step >= 4);

    if (step <= 1) {
        drawPerson(svg, 82, 170, 'rags', step === 0 ? 'RAGS' : 'OURS', null, false);
        drawPerson(svg, 268, 170, 'robe', 'ROBE', '#D7B85A', false);
    }

    if (step === 2) {
        drawPerson(svg, 82, 170, 'plain', 'EMPTY', null, false);
        drawPerson(svg, 268, 170, 'rags', 'SIN', '#D7B85A', false);
        drawLooseCloth(svg, 176, 125, DARK, '#151515', 'SIN', '#FFFFFF', 0.82);
        drawArrow(svg, 118, 130, 226, 130, '#7A4B42', 1, 'M118 130 C150 101 194 101 226 130');
    }

    if (step === 3) {
        drawPerson(svg, 82, 170, 'plain', 'EMPTY', null, true);
        drawPerson(svg, 268, 170, 'rags', 'SIN', null, true);
        drawLooseCloth(svg, 175, 157, DARK, '#151515', 'SIN', '#FFFFFF', 0.92);
        addPath(svg, 'M150 205 C166 218 187 218 203 205', '#7A4B42', 3, 'none', 0.75);
        addText(svg, 'paid', 221, 230, '#7A4B42', 14, 800);
    }

    if (step === 4) {
        drawPerson(svg, 82, 170, 'plain', 'EMPTY', null, true);
        drawPerson(svg, 268, 170, 'robe', 'LIFE', '#D7B85A', false);
        addPath(svg, 'M139 103 C157 74 193 74 211 103', '#D7B85A', 4, 'none', 0.78);
        addText(svg, 'risen', 175, 71, '#9B7B2F', 14, 800);
    }

    if (step === 5) {
        drawPerson(svg, 82, 170, 'robe', 'ROBE', '#D7B85A', false);
        drawPerson(svg, 268, 170, 'robe', 'GIFT', '#D7B85A', false);
        drawLooseCloth(svg, 175, 125, WHITE, '#D7CBAF', 'GIFT', '#1A6B55', 0.82);
        drawArrow(svg, 232, 130, 121, 130, '#4A6B8B', 1, 'M232 130 C199 101 154 101 121 130');
    }

    if (step >= 6) {
        drawPerson(svg, 82, 170, 'robe', 'IN CHRIST', '#D7B85A', false);
        drawPerson(svg, 268, 170, 'robe', 'RISEN', '#D7B85A', false);
        drawArrow(svg, 128, 108, 222, 108, '#1A6B55', 0.65, 'M128 108 C156 83 194 83 222 108');
        drawArrow(svg, 222, 151, 128, 151, '#7A4B42', 0.45, 'M222 151 C194 180 156 180 128 151');
    }

    addText(svg, 'us', 82, 269, '#5A4E3C', 12, 700);
    addText(svg, 'Christ', 268, 269, '#5A4E3C', 12, 700);

    diagram.appendChild(svg);

    var pill = document.createElement('div');
    pill.className = 'caption-pill';
    pill.style.borderColor = cur.color + '55';
    pill.style.boxShadow = '0 6px 14px ' + cur.color + '1F';
    pill.textContent = cur.caption;
    diagram.appendChild(pill);
}

function renderCard() {
    var cur = slides[step];
    var cardArea = document.getElementById('card-area');
    cardArea.innerHTML = '';

    var wrapper = document.createElement('div');
    wrapper.className = 'verse-card-wrapper';

    var card = document.createElement('div');
    card.className = 'verse-card';

    var bar = document.createElement('div');
    bar.className = 'verse-card-bar';
    bar.style.background = cur.color;

    var content = document.createElement('div');
    content.className = 'verse-card-content';
    content.style.setProperty('--accent-color', cur.color);

    var title = document.createElement('h2');
    title.className = 'verse-card-title';
    title.style.color = cur.color;
    title.textContent = cur.title;

    var text = document.createElement('p');
    text.className = 'verse-card-text';
    text.innerHTML = cur.text;

    var ref = document.createElement('p');
    ref.className = 'verse-card-ref';
    ref.textContent = cur.ref;

    content.appendChild(title);
    content.appendChild(text);
    content.appendChild(ref);
    card.appendChild(bar);
    card.appendChild(content);
    wrapper.appendChild(card);
    wrapper.appendChild(buildNav(cur.color));
    cardArea.appendChild(wrapper);
}

function buildNav(color) {
    var nav = document.createElement('div');
    nav.className = 'nav-bar';

    var back = document.createElement('button');
    back.className = 'nav-btn';
    back.textContent = '\u2190 Back';
    back.disabled = step === 0;
    back.style.color = step === 0 ? '#CCC5B8' : '#5A4E3C';
    back.addEventListener('click', function() {
        step = Math.max(0, step - 1);
        render();
    });
    nav.appendChild(back);

    var dots = document.createElement('div');
    dots.className = 'dot-nav';
    slides.forEach(function(slide, idx) {
        var dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.width = step === idx ? '20px' : '8px';
        dot.style.background = step === idx ? slides[idx].color : (idx < step ? slides[idx].color + '80' : '#D4CFC4');
        if (idx <= step) {
            dot.style.cursor = 'pointer';
            dot.addEventListener('click', function() {
                step = idx;
                render();
            });
        }
        dots.appendChild(dot);
    });
    nav.appendChild(dots);

    var next = document.createElement('button');
    next.className = 'nav-btn primary';
    next.textContent = step === slides.length - 1 ? '\u21BB Restart' : 'Next \u2192';
    next.style.background = color;
    next.style.boxShadow = '0 2px 8px ' + color + '33';
    next.addEventListener('click', function() {
        step = step === slides.length - 1 ? 0 : Math.min(slides.length - 1, step + 1);
        render();
    });
    nav.appendChild(next);

    return nav;
}

function render() {
    drawDiagram();
    renderCard();
}

render();
</script>
</body>
</html>
