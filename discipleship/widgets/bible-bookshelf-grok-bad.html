<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Bookshelf • Your Map to God’s Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f4efe6;
            --surface: rgba(255, 252, 247, 0.92);
            --text: #2b241d;
            --muted: #74665a;
            --border: rgba(101, 74, 46, 0.14);
            --shelf-wood: linear-gradient(180deg, #c59557 0%, #a16f37 100%);
            --radius: 20px;
            --law: #5d7f57;
            --history: #876648;
            --poetry: #c39d37;
            --major-prophets: #725389;
            --minor-prophets: #8c5872;
            --gospels: #2f7957;
            --acts: #bf5e23;
            --pauls-letters: #2d689b;
            --other-letters: #267a6e;
            --prophecy: #8a4459;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: transparent;
            color: var(--text);
            line-height: 1.55;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .testament {
            margin-bottom: 24px;
        }

        .testament-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .testament-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2B5A83;
        }

        .testament-count {
            font-size: 0.75rem;
            font-weight: 700;
            color: #2B5A83;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(43, 90, 131, 0.1);
            border: 1px solid rgba(43, 90, 131, 0.2);
            border-radius: 999px;
            padding: 4px 12px;
        }

        .shelf-stack {
            display: grid;
            gap: 12px;
        }

        .shelf-group {
            background: linear-gradient(180deg, rgba(255, 251, 244, 0.96), rgba(246, 239, 228, 0.86));
            border: 1px solid rgba(101, 74, 46, 0.14);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.22s ease;
            width: 100%;
            text-align: left;
        }

        .shelf-group:hover,
        .shelf-group:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(74, 52, 28, 0.12);
        }

        .shelf-group.active {
            border-color: color-mix(in srgb, var(--section-color) 60%, white);
            box-shadow: 0 12px 28px rgba(74, 52, 28, 0.14);
        }

        .shelf-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .shelf-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shelf-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--section-color);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--section-color) 20%, white);
            flex-shrink: 0;
        }

        .shelf-title {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .shelf-meta {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .book-shelves {
            background: rgba(112, 78, 40, 0.08);
            border-radius: 14px;
            padding: 12px 12px 6px;
            display: grid;
            gap: 8px;
        }

        .shelf-row {
            margin-bottom: 6px;
        }

        .book-spines {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .spine {
            min-width: 36px;
            max-width: 52px;
            flex: 1 1 36px;
            height: 88px;
            border-radius: 6px 6px 2px 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.24), rgba(255,255,255,0.04) 20%, rgba(0,0,0,0.12) 100%),
                        var(--section-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 3px;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.15;
            text-align: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-shadow: 0 1px 3px rgba(0,0,0,0.35);
            box-shadow: inset 1px 0 0 rgba(255,255,255,0.2), inset -2px 0 0 rgba(0,0,0,0.16);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .spine:hover {
            transform: scale(1.08) translateY(-2px);
        }

        .shelf-plank {
            height: 10px;
            border-radius: 999px;
            background: var(--shelf-wood);
            margin-top: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 10px rgba(77,46,16,0.2);
        }

        .info-card {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s ease, opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .info-card.open {
            max-height: 800px;
            opacity: 1;
            margin-top: 14px;
        }

        .info-card-inner {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            border-left: 5px solid var(--section-color);
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }

        .info-card-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--section-color);
            margin-bottom: 6px;
        }

        .info-card-books {
            font-style: italic;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .info-card-text {
            font-size: 0.97rem;
            line-height: 1.6;
        }

        .info-card-verse {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(43,90,131,0.04);
            border-radius: 10px;
            font-size: 0.95rem;
            font-style: italic;
        }

        .welcome-header {
            background: rgba(245,239,227,0.96);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border-left: 6px solid #2B5A83;
            box-shadow: 0 4px 14px rgba(43,90,131,0.09);
        }

        .welcome-header h2 {
            font-size: 1.35rem;
            color: #2B5A83;
            margin-bottom: 8px;
        }

        .welcome-header p {
            font-size: 0.98rem;
            color: #5c4f44;
            line-height: 1.55;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b241d;
            color: white;
            padding: 12px 28px;
            border-radius: 999px;
            font-size: 0.96rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            opacity: 0;
            transition: all 0.32s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-12px);
        }

        .chevron {
            transition: transform 0.25s ease;
        }

        .shelf-group.active .chevron {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div id="library"></div>

    <div id="toast" class="toast">Great choice — that book is part of God’s big rescue story!</div>

    <script>
        const library = document.getElementById("library");
        const toastEl = document.getElementById("toast");
        let activeSection = null;

        const data = [
            {
                testament: "Old Testament",
                count: "39 books — Preparing the way",
                sections: [
                    { id: "law", title: "The Law (Pentateuch)", subtitle: "5 books", books: ["Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy"], text: "The beginning of everything — Creation, the fall into sin, God’s promise to Abraham, rescue from Egypt, and the giving of the Law. These books show God choosing a people and pointing forward to a coming Savior.", keyVerse: "Genesis 12:3 — “…in you all the families of the earth shall be blessed.”" },
                    { id: "history", title: "History", subtitle: "12 books", books: ["Joshua", "Judges", "Ruth", "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra", "Nehemiah", "Esther"], text: "The story of Israel in the Promised Land — conquest, kings, exile, and return. Full of real people, real failures, and God’s faithful love that never gives up.", keyVerse: "Ruth 1:16 — “Your people shall be my people, and your God my God.”" },
                    { id: "poetry", title: "Poetry & Wisdom", subtitle: "5 books", books: ["Job", "Psalms", "Proverbs", "Ecclesiastes", "Song of Solomon"], text: "Heart cries, songs of worship, practical wisdom, honest questions about suffering, and celebration of love. These books teach us how to feel and live honestly before God.", keyVerse: "Psalm 23:1 — “The Lord is my shepherd; I shall not want.”" },
                    { id: "major-prophets", title: "Major Prophets", subtitle: "5 books", books: ["Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel"], text: "Big messages from God — calling Israel back to Him, warning of judgment, but always promising rescue and a coming King who will make everything right.", keyVerse: "Isaiah 53:5 — “He was pierced for our transgressions… and with his wounds we are healed.”" },
                    { id: "minor-prophets", title: "Minor Prophets", subtitle: "12 books", books: ["Hosea", "Joel", "Amos", "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah", "Malachi"], text: "Shorter but powerful voices — love, justice, repentance, and hope. Jonah reminds us God even cares about those we think are “enemies.”", keyVerse: "Micah 6:8 — “Do justice, love mercy, walk humbly with your God.”" }
                ]
            },
            {
                testament: "New Testament",
                count: "27 books — The fulfillment in Jesus",
                sections: [
                    { id: "gospels", title: "The Gospels", subtitle: "4 books", books: ["Matthew", "Mark", "Luke", "John"], text: "The heart of the whole Bible — the life, death, and resurrection of Jesus. If you’re new to the Bible, start right here. Everything before points to Him; everything after flows from Him.", keyVerse: "John 20:31 — “…these are written so that you may believe that Jesus is the Christ…and have life in his name.”" },
                    { id: "acts", title: "Acts", subtitle: "1 book", books: ["Acts"], text: "The birth and explosive growth of the church — the Holy Spirit comes, the gospel spreads from Jerusalem to Rome. Shows us what a Spirit-filled community looks like.", keyVerse: "Acts 1:8 — “…you will be my witnesses…to the end of the earth.”" },
                    { id: "pauls-letters", title: "Paul’s Letters", subtitle: "13 books", books: ["Romans", "1 Corinthians", "2 Corinthians", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thessalonians", "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon"], text: "Deep explanations of the gospel, how to live it out in relationships, suffering, and mission. Romans is like a mini-Bible summary — hugely helpful.", keyVerse: "Romans 8:1 — “There is therefore now no condemnation for those who are in Christ Jesus.”" },
                    { id: "other-letters", title: "Other Letters", subtitle: "8 books", books: ["Hebrews", "James", "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude"], text: "Practical encouragement for everyday faith — enduring trials, controlling the tongue, loving one another, staying true in hard times.", keyVerse: "James 1:22 — “Be doers of the word, and not hearers only.”" },
                    { id: "prophecy", title: "Prophecy (Revelation)", subtitle: "1 book", books: ["Revelation"], text: "A breathtaking vision of Jesus winning forever — the end of evil, the renewal of all things, and God living with His people. It’s hope, not fear, for those who belong to Him.", keyVerse: "Revelation 21:5 — “Behold, I am making all things new.”" }
                ]
            }
        ];

        function createSpineLabel(name) {
            return name
                .replace("Thessalonians", "Thess")
                .replace("Corinthians", "Cor")
                .replace("Deuteronomy", "Deut")
                .replace("Leviticus", "Lev")
                .replace("Lamentations", "Lam")
                .replace("Chronicles", "Chron")
                .replace("Philippians", "Phil")
                .replace("Ecclesiastes", "Eccl");
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add("show");
            setTimeout(() => toastEl.classList.remove("show"), 2400);
        }

        function renderLibrary() {
            // Welcome always first
            const welcome = document.createElement("div");
            welcome.className = "welcome-header";
            welcome.innerHTML = `
                <h2>The Bible: One Beautiful Story</h2>
                <p>It’s not 66 random books — it’s one amazing story of God rescuing us through Jesus. Tap any shelf to explore. New to the Bible? Start with the Gospels!</p>
            `;
            library.appendChild(welcome);

            data.forEach(testament => {
                const wrapper = document.createElement("div");
                wrapper.className = "testament";

                wrapper.innerHTML += `
                    <div class="testament-header">
                        <div class="testament-title">${testament.testament}</div>
                        <div class="testament-count">${testament.count}</div>
                    </div>
                `;

                const stack = document.createElement("div");
                stack.className = "shelf-stack";

                testament.sections.forEach(section => {
                    const group = document.createElement("button");
                    group.className = "shelf-group";
                    group.dataset.sectionId = section.id;
                    group.style.setProperty("--section-color", `var(--${section.id})`);

                    const header = document.createElement("div");
                    header.className = "shelf-group-header";
                    header.innerHTML = `
                        <div class="shelf-title-wrap">
                            <span class="shelf-dot"></span>
                            <div class="shelf-title">${section.title}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div class="shelf-meta">${section.subtitle}</div>
                            <div class="chevron">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>
                    `;

                    const shelvesContainer = document.createElement("div");
                    shelvesContainer.className = "book-shelves";

                    const booksPerShelf = section.books.length <= 6 ? section.books.length : Math.ceil(section.books.length / 2);
                    const chunks = [];
                    for (let i = 0; i < section.books.length; i += booksPerShelf) {
                        chunks.push(section.books.slice(i, i + booksPerShelf));
                    }

                    chunks.forEach(chunk => {
                        const row = document.createElement("div");
                        row.className = "shelf-row";

                        const spines = document.createElement("div");
                        spines.className = "book-spines";

                        chunk.forEach(bookName => {
                            const spine = document.createElement("div");
                            spine.className = "spine";
                            spine.textContent = createSpineLabel(bookName);
                            spine.title = bookName;
                            spine.addEventListener("click", e => {
                                e.stopPropagation();
                                showToast(`Great choice — ${bookName} is part of God’s big rescue story!`);
                            });
                            spines.appendChild(spine);
                        });

                        const plank = document.createElement("div");
                        plank.className = "shelf-plank";

                        row.appendChild(spines);
                        row.appendChild(plank);
                        shelvesContainer.appendChild(row);
                    });

                    const infoCard = document.createElement("div");
                    infoCard.className = "info-card";
                    infoCard.id = `card-${section.id}`;
                    infoCard.innerHTML = `
                        <div class="info-card-inner">
                            <div class="info-card-label">${section.title} • ${section.subtitle}</div>
                            <div class="info-card-books">${section.books.join(", ")}</div>
                            <div class="info-card-text">${section.text}</div>
                            <div class="info-card-verse">${section.keyVerse}</div>
                        </div>
                    `;

                    group.appendChild(header);
                    group.appendChild(shelvesContainer);
                    group.appendChild(infoCard);

                    group.addEventListener("click", () => toggleSection(section.id));

                    stack.appendChild(group);
                });

                wrapper.appendChild(stack);
                library.appendChild(wrapper);
            });
        }

        function toggleSection(sectionId) {
            if (activeSection === sectionId) {
                document.getElementById(`card-${sectionId}`).classList.remove("open");
                document.querySelector(`[data-section-id="${sectionId}"]`).classList.remove("active");
                activeSection = null;
                return;
            }

            document.querySelectorAll(".info-card.open").forEach(c => c.classList.remove("open"));
            document.querySelectorAll(".shelf-group.active").forEach(g => g.classList.remove("active"));

            const card = document.getElementById(`card-${sectionId}`);
            const group = document.querySelector(`[data-section-id="${sectionId}"]`);
            if (card) card.classList.add("open");
            if (group) group.classList.add("active");
            activeSection = sectionId;

            setTimeout(() => group.scrollIntoView({ behavior: "smooth", block: "nearest" }), 120);
        }

        renderLibrary();

        // Auto-open Gospels for first-time visitors
        if (!localStorage.getItem("bibleBookshelfVisited")) {
            setTimeout(() => {
                toggleSection("gospels");
                localStorage.setItem("bibleBookshelfVisited", "true");
            }, 800);
        }
    </script>
</body>
</html>
