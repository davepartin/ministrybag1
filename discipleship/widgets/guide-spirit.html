<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The GUIDE of the Holy Spirit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

        :root {
            --course-green: #1A6B55;
            --course-green-soft: #D4F2E8;
            --earth-cream: #F7F2E8;
            --earth-mist: #EEE7D9;
            --earth-tan: #D7C0A0;
            --earth-trail: #B48355;
            --earth-trail-light: #E7D1B3;
            --charcoal: #2C2416;
            --muted: #8C8375;
            --border: #E7DECE;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, Cambria, serif;
            background: transparent;
            color: var(--charcoal);
            -webkit-font-smoothing: antialiased;
            padding: 0;
            margin: 0;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .widget-outer {
            background: #FFFFFF;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            border: none;
            max-width: 100%;
            width: 100%;
            margin: 0;
            position: relative;
        }

        @media (min-width: 560px) {
            body {
                padding: 16px;
            }

            .widget-outer {
                border-radius: 12px;
                box-shadow: 0 6px 20px rgba(44, 36, 22, 0.08);
                border: 1px solid #EBE5D9;
                max-width: 460px;
                margin: 0 auto;
            }
        }

        .title-bar {
            background: var(--charcoal);
            padding: 6px 14px;
            text-align: center;
        }

        .title-bar h1 {
            font-size: 18px;
            font-weight: 700;
            color: #FAF8F3;
            margin: 0;
            line-height: 1.15;
            font-family: 'Trebuchet MS', 'Inter', sans-serif;
            letter-spacing: 0.1px;
        }

        .diagram-wrapper {
            padding: 0;
            display: flex;
            justify-content: center;
            height: 292px;
            background: #F7F4ED;
        }

        .diagram-container {
            position: relative;
            overflow: hidden;
            width: 350px;
            height: 292px;
        }

        .scene-svg {
            display: block;
            width: 350px;
            height: 292px;
        }

        .step-box,
        .summit-note {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.55s ease, transform 0.55s ease;
        }

        .step-box.visible,
        .summit-note.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .step-box {
            min-width: 92px;
            max-width: 132px;
            padding: 8px 10px 8px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(235, 229, 217, 0.92);
            box-shadow: 0 6px 18px rgba(44, 36, 22, 0.06);
        }

        .step-box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 4px;
            background: var(--box-accent, var(--course-green));
        }

        .step-box .box-letter {
            display: inline-block;
            margin-right: 6px;
            color: var(--box-accent, var(--course-green));
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            vertical-align: top;
        }

        .step-box .box-text {
            display: inline-block;
            color: var(--charcoal);
            font-family: 'Trebuchet MS', 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
            line-height: 1.2;
            max-width: 84px;
            vertical-align: top;
        }

        .summit-note {
            right: 14px;
            top: 14px;
            width: 108px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(235, 229, 217, 0.92);
            box-shadow: 0 6px 18px rgba(44, 36, 22, 0.06);
            color: var(--course-green);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 10px;
            line-height: 1.35;
            text-align: left;
        }

        .intro-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 18px 22px;
            pointer-events: none;
        }

        .intro-verse {
            font-size: 16px;
            line-height: 1.35;
            color: var(--charcoal);
            font-style: italic;
            margin: 0 0 8px 0;
            text-shadow: 0 1px 6px rgba(250, 248, 243, 0.95);
        }

        .intro-ref {
            font-size: 12px;
            color: var(--muted);
            font-family: 'Trebuchet MS', 'Inter', sans-serif;
            font-weight: 700;
            margin: 0;
        }

        #card-area {
            background-color: #F6F4EE;
            border-top: 1px solid #EBE5D9;
            padding-top: 8px;
        }

        .verse-card-wrapper {
            margin: 0 auto;
            padding: 0 12px 8px;
        }

        .verse-card {
            background: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 14px rgba(44, 36, 22, 0.06);
            animation: fadeSlide 0.35s ease;
        }

        .verse-card-bar {
            height: 4px;
            background: var(--card-accent, var(--course-green));
        }

        .verse-card-content {
            padding: 10px 16px;
            height: 112px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            --accent-color: var(--card-accent, var(--course-green));
        }

        .verse-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #5A4E3C;
            margin: 0 0 4px 0;
            line-height: 1.25;
            font-family: 'Playfair Display', Georgia, serif;
        }

        .title-accent {
            color: var(--accent-color);
        }

        .verse-card-text {
            font-size: 12px;
            line-height: 1.38;
            color: #3D3426;
            margin: 0 0 4px 0;
            flex-grow: 1;
        }

        .verse-card-text b {
            color: var(--accent-color);
            font-weight: 700;
        }

        .card-note {
            display: block;
            margin-top: 6px;
            color: #5A4D3B;
        }

        .verse-card-ref {
            font-size: 11px;
            color: var(--accent-color);
            margin: 0;
            font-weight: 600;
            font-family: 'Trebuchet MS', 'Inter', sans-serif;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 2px;
            gap: 8px;
        }

        .nav-btn {
            background: transparent;
            border: 1.5px solid rgba(44, 36, 22, 0.15);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            font-family: 'Trebuchet MS', 'Inter', sans-serif;
            cursor: pointer;
            font-weight: 600;
            color: #2C2416;
        }

        .nav-btn.primary {
            color: #FFFFFF;
            border: none;
            min-width: 96px;
        }

        .nav-btn:disabled {
            color: #C2BAAE;
            cursor: default;
        }

        .dot-nav {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .dot {
            height: 8px;
            border-radius: 999px;
            transition: all 0.3s ease;
        }

        .dot.active-dot {
            cursor: pointer;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

<div class="widget-outer">
    <div class="title-bar">
        <h1>The GUIDE of the Holy Spirit</h1>
    </div>

    <div class="diagram-wrapper">
        <div class="diagram-container" id="diagram"></div>
    </div>

    <div id="card-area"></div>
</div>

<script>
var W = 350;
var H = 292;
var NS = 'http://www.w3.org/2000/svg';
var BASE_ACCENT = '#5A4E3C';
var BASE_LINE = '#D7D0C3';
var BASE_LINE_INNER = '#F8F6F0';

var step = -1;

var stops = [
    {
        letter: 'G',
        color: '#4A7C59',
        action: 'Glorifies the Savior',
        fullTitle: '<span class="title-accent">Glorifies</span> the Savior',
        boxLeft: 12,
        boxTop: 12,
        markerX: 38,
        markerY: 54,
        path: 'M 34 46 C 48 48, 60 52, 74 59 C 87 65, 97 68, 110 70',
        verse: '"He will <b>glorify me</b>, for he will take what is mine and <b>declare it to you</b>."',
        note: 'The Spirit always points you to Jesus.',
        ref: 'John 16:14 ESV'
    },
    {
        letter: 'U',
        color: '#8A4E42',
        action: 'Unites Sinners to God',
        fullTitle: '<span class="title-accent">Unites</span> sinners to God',
        boxLeft: 114,
        boxTop: 58,
        markerX: 114,
        markerY: 72,
        path: 'M 110 70 C 123 72, 134 77, 144 87 C 152 96, 160 102, 173 108',
        verse: '"You have received the <b>Spirit of adoption</b>... The Spirit himself <b>bears witness</b> with our spirit that we are children of God."',
        note: 'He brings you near as God\'s child.',
        ref: 'Romans 8:15-16 ESV'
    },
    {
        letter: 'I',
        color: '#55697B',
        action: 'Inspires & Illuminates Scripture',
        fullTitle: '<span class="title-accent">Inspires</span> and illuminates Scripture',
        boxLeft: 66,
        boxTop: 110,
        markerX: 177,
        markerY: 112,
        path: 'M 173 108 C 185 114, 195 120, 201 131 C 206 140, 207 149, 205 158',
        verse: '"No prophecy of Scripture comes from someone\'s own interpretation... men spoke from God as they were <b>carried along by the Holy Spirit</b>."',
        note: 'The Spirit who gave Scripture helps you understand it.',
        ref: '2 Peter 1:21 ESV'
    },
    {
        letter: 'D',
        color: '#B8860B',
        action: 'Directs Steps',
        fullTitle: '<span class="title-accent">Directs</span> steps',
        boxLeft: 196,
        boxTop: 162,
        markerX: 205,
        markerY: 162,
        path: 'M 205 158 C 204 170, 209 180, 222 189 C 235 197, 248 202, 262 207',
        verse: '"For all who are <b>led by the Spirit of God</b> are sons of God."',
        note: 'He walks ahead and leads your steps.',
        ref: 'Romans 8:14 ESV'
    },
    {
        letter: 'E',
        color: '#7B5E8E',
        action: 'Eternal Security',
        fullTitle: '<span class="title-accent">Eternal</span> security',
        boxLeft: 124,
        boxTop: 214,
        markerX: 266,
        markerY: 210,
        path: 'M 262 207 C 276 212, 289 220, 301 230 C 312 239, 320 247, 326 254',
        verse: '"You were <b>sealed with the promised Holy Spirit</b>, who is the <b>guarantee of our inheritance</b>."',
        note: 'He is God\'s seal and sure promise.',
        ref: 'Ephesians 1:13-14 ESV'
    }
];

function svgEl(tag, attrs) {
    var el = document.createElementNS(NS, tag);
    for (var key in attrs) {
        el.setAttribute(key, attrs[key]);
    }
    return el;
}

function animateStroke(pathEl, delay) {
    var len = pathEl.getTotalLength();
    pathEl.setAttribute('stroke-dasharray', len);
    pathEl.setAttribute('stroke-dashoffset', len);
    pathEl.style.transition = 'stroke-dashoffset 0.95s ease';
    setTimeout(function() {
        pathEl.setAttribute('stroke-dashoffset', '0');
    }, delay || 30);
}

function animateSvgOpacity(el, delay) {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.6s ease';
    setTimeout(function() {
        el.style.opacity = '1';
    }, delay || 60);
}

function revealHtml(el, delay) {
    setTimeout(function() {
        el.classList.add('visible');
    }, delay || 40);
}

function getThemeColor() {
    return step === -1 ? BASE_ACCENT : stops[step].color;
}

function colorMix(hex, opacity) {
    var clean = hex.replace('#', '');
    var num = parseInt(clean, 16);
    var r = (num >> 16) & 255;
    var g = (num >> 8) & 255;
    var b = num & 255;
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + opacity + ')';
}

function buildMarker(svg, stop, shouldAnimate) {
    var marker = svgEl('g', {});
    var tone = stop.color;

    var glow = svgEl('circle', {
        cx: stop.markerX,
        cy: stop.markerY,
        r: 9,
        fill: tone,
        opacity: '0.12'
    });
    marker.appendChild(glow);

    marker.appendChild(svgEl('circle', {
        cx: stop.markerX,
        cy: stop.markerY,
        r: 5.5,
        fill: tone,
        stroke: '#FFFFFF',
        'stroke-width': '2.4'
    }));

    if (shouldAnimate) {
        animateSvgOpacity(marker, 200);
    }

    svg.appendChild(marker);
}

function buildScene() {
    var diagram = document.getElementById('diagram');
    diagram.innerHTML = '';

    var isIntro = step === -1;
    var themeColor = getThemeColor();
    var svg = svgEl('svg', {
        class: 'scene-svg',
        width: W,
        height: H,
        viewBox: '0 0 ' + W + ' ' + H
    });

    var defs = svgEl('defs', {});

    var panelGradient = svgEl('linearGradient', {
        id: 'panelGradient',
        x1: '0',
        y1: '0',
        x2: '0',
        y2: '1'
    });
    panelGradient.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#F8F6F1' }));
    panelGradient.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#F2EEE6' }));
    defs.appendChild(panelGradient);

    svg.appendChild(defs);

    svg.appendChild(svgEl('rect', {
        x: '0',
        y: '0',
        width: W,
        height: H,
        fill: 'url(#panelGradient)'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 12 40 C 76 24, 137 36, 193 28 C 250 20, 299 31, 338 24',
        fill: 'none',
        stroke: '#E4DDD0',
        'stroke-width': '2',
        'stroke-linecap': 'round'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 18 84 C 83 65, 139 81, 191 100 C 242 119, 290 125, 334 118',
        fill: 'none',
        stroke: '#E7E0D5',
        'stroke-width': '1.8',
        'stroke-linecap': 'round'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 16 142 C 82 128, 141 145, 193 167 C 243 188, 289 201, 334 200',
        fill: 'none',
        stroke: '#E5DED3',
        'stroke-width': '1.8',
        'stroke-linecap': 'round',
        opacity: '0.95'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 14 212 C 80 201, 141 218, 197 238 C 247 256, 294 269, 338 268',
        fill: 'none',
        stroke: '#E4DDD2',
        'stroke-width': '1.8',
        'stroke-linecap': 'round',
        opacity: '0.95'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 44 94 C 48 86, 50 78, 52 71 M 51 90 C 56 84, 59 77, 61 70 M 58 92 C 64 86, 67 78, 69 71',
        fill: 'none',
        stroke: '#5E7657',
        'stroke-width': '1.4',
        'stroke-linecap': 'round',
        opacity: '0.40'
    }));

    svg.appendChild(svgEl('path', {
        d: 'M 292 248 C 297 241, 300 233, 302 226 M 298 245 C 304 239, 307 232, 309 225 M 305 247 C 311 241, 315 233, 317 226',
        fill: 'none',
        stroke: '#5E7657',
        'stroke-width': '1.4',
        'stroke-linecap': 'round',
        opacity: '0.40'
    }));

    var fullTrail = 'M 34 46 C 48 48, 60 52, 74 59 C 87 65, 97 68, 110 70 C 123 72, 134 77, 144 87 C 152 96, 160 102, 173 108 C 185 114, 195 120, 201 131 C 206 140, 207 149, 205 158 C 204 170, 209 180, 222 189 C 235 197, 248 202, 262 207 C 276 212, 289 220, 301 230 C 312 239, 320 247, 326 254';

    svg.appendChild(svgEl('path', {
        d: fullTrail,
        fill: 'none',
        stroke: BASE_LINE,
        'stroke-width': '8',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
        opacity: '0.92'
    }));

    svg.appendChild(svgEl('path', {
        d: fullTrail,
        fill: 'none',
        stroke: BASE_LINE_INNER,
        'stroke-width': '2.5',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
        opacity: '0.92'
    }));

    for (var i = 0; i <= step; i++) {
        svg.appendChild(svgEl('path', {
            d: stops[i].path,
            fill: 'none',
            stroke: colorMix(stops[i].color, 0.18),
            'stroke-width': '10',
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round'
        }));

        var activeTrail = svgEl('path', {
            d: stops[i].path,
            fill: 'none',
            stroke: stops[i].color,
            'stroke-width': '6',
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round'
        });

        if (i === step) {
            animateStroke(activeTrail, 80);
        }

        svg.appendChild(activeTrail);
    }

    for (var j = 0; j <= step; j++) {
        buildMarker(svg, stops[j], j === step);
    }

    diagram.appendChild(svg);

    for (var k = 0; k <= step; k++) {
        var box = document.createElement('div');
        box.className = 'step-box';
        box.style.left = stops[k].boxLeft + 'px';
        box.style.top = stops[k].boxTop + 'px';
        box.style.setProperty('--box-accent', stops[k].color);
        box.innerHTML =
            '<span class="box-letter">' + stops[k].letter + '</span>' +
            '<span class="box-text">' + stops[k].action + '</span>';
        diagram.appendChild(box);

        if (k < step) {
            box.classList.add('visible');
        } else {
            revealHtml(box, 210);
        }
    }

    if (step === stops.length - 1) {
        var summit = document.createElement('div');
        summit.className = 'summit-note';
        summit.style.color = themeColor;
        summit.textContent = 'The five boxes now spell GUIDE.';
        diagram.appendChild(summit);
        revealHtml(summit, 280);
    }

    if (isIntro) {
        var overlay = document.createElement('div');
        overlay.className = 'intro-overlay';
        overlay.innerHTML =
            '<div>' +
                '<p class="intro-verse">"I will ask the Father, and he will give you another Helper, to be with you forever."</p>' +
                '<p class="intro-ref">John 14:16-17 ESV</p>' +
            '</div>';
        diagram.appendChild(overlay);
    }
}

function renderCard() {
    var cardArea = document.getElementById('card-area');
    cardArea.innerHTML = '';
    var themeColor = getThemeColor();

    var wrapper = document.createElement('div');
    wrapper.className = 'verse-card-wrapper';

    var card = document.createElement('div');
    card.className = 'verse-card';

    var bar = document.createElement('div');
    bar.className = 'verse-card-bar';
    card.appendChild(bar);

    var content = document.createElement('div');
    content.className = 'verse-card-content';
    content.style.setProperty('--accent-color', themeColor);

    var title = document.createElement('h2');
    title.className = 'verse-card-title';

    var verse = document.createElement('p');
    verse.className = 'verse-card-text';

    if (step === -1) {
        title.innerHTML = '<span class="title-accent">The Spirit</span> walks with you';
        verse.innerHTML = 'Walk the trail to see five steady works of the Holy Spirit. He does not leave believers guessing in the dark; He leads, assures, and keeps drawing us toward Jesus.';
    } else {
        title.innerHTML = stops[step].fullTitle;
        verse.innerHTML = stops[step].verse + '<span class="card-note">' + stops[step].note + '</span>';
    }

    content.appendChild(title);
    content.appendChild(verse);

    if (step !== -1) {
        var ref = document.createElement('p');
        ref.className = 'verse-card-ref';
        ref.textContent = stops[step].ref;
        content.appendChild(ref);
    }

    card.appendChild(content);
    wrapper.appendChild(card);
    wrapper.appendChild(buildNav());
    cardArea.appendChild(wrapper);
}

function buildNav() {
    var nav = document.createElement('div');
    nav.className = 'nav-bar';
    var themeColor = getThemeColor();

    var backBtn = document.createElement('button');
    backBtn.className = 'nav-btn';
    backBtn.innerHTML = '&larr; Back';

    if (step === -1) {
        backBtn.style.visibility = 'hidden';
    } else {
        backBtn.addEventListener('click', function() {
            step -= 1;
            render();
        });
    }
    nav.appendChild(backBtn);

    var dots = document.createElement('div');
    dots.className = 'dot-nav';

    for (var i = 0; i < stops.length; i++) {
        (function(idx) {
            var d = document.createElement('div');
            d.className = 'dot' + (step !== -1 && idx <= step ? ' active-dot' : '');
            d.style.width = step !== -1 && step === idx ? '20px' : '8px';
            d.style.background = step !== -1 && step === idx ? themeColor : (step !== -1 && idx <= step ? colorMix(themeColor, 0.38) : 'rgba(44, 36, 22, 0.14)');
            d.style.cursor = step !== -1 && idx <= step ? 'pointer' : 'default';
            if (step !== -1 && idx <= step) {
                d.addEventListener('click', function() {
                    step = idx;
                    render();
                });
            }
            dots.appendChild(d);
        })(i);
    }
    nav.appendChild(dots);

    var nextBtn = document.createElement('button');
    nextBtn.className = 'nav-btn primary';
    nextBtn.style.background = themeColor;
    nextBtn.style.boxShadow = '0 4px 10px ' + colorMix(themeColor, 0.18);

    if (step === -1) {
        nextBtn.innerHTML = 'Begin &rarr;';
    } else if (step === stops.length - 1) {
        nextBtn.innerHTML = '&#8635; Restart';
    } else {
        nextBtn.innerHTML = 'Next &rarr;';
    }

    nextBtn.addEventListener('click', function() {
        if (step === -1) {
            step = 0;
        } else if (step === stops.length - 1) {
            step = -1;
        } else {
            step += 1;
        }
        render();
    });

    nav.appendChild(nextBtn);
    return nav;
}

function render() {
    document.documentElement.style.setProperty('--card-accent', getThemeColor());
    buildScene();
    renderCard();
}

render();
</script>

</body>
</html>
