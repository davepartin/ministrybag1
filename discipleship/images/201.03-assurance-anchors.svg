<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Three Anchors of Assurance</title>
  <desc id="desc">A diagram with a center circle saying I belong to Jesus and three surrounding panels for Promise, Presence, and Posture.</desc>
  <rect width="1200" height="900" fill="#f7f4ee"/>
  <rect x="70" y="70" width="1060" height="760" rx="32" fill="#fcfbf8" stroke="#2d2821" stroke-width="6"/>
  <text x="600" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#2d2821">Three Anchors of Assurance</text>
  <text x="600" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#706658">When confidence shakes, come back here.</text>

  <circle cx="600" cy="470" r="130" fill="#1a6b55" stroke="#2d2821" stroke-width="6"/>
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#f9f7f2">I Belong</text>
  <text x="600" y="486" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#f9f7f2">to Jesus</text>
  <text x="600" y="528" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="21" fill="#eaf4ef">Not by perfect feelings.</text>

  <path d="M600 340V245" stroke="#9d9385" stroke-width="10" stroke-linecap="round"/>
  <path d="M492 554L365 646" stroke="#9d9385" stroke-width="10" stroke-linecap="round"/>
  <path d="M708 554L835 646" stroke="#9d9385" stroke-width="10" stroke-linecap="round"/>

  <rect x="420" y="200" width="360" height="150" rx="24" fill="#efe7db" stroke="#2d2821" stroke-width="5"/>
  <text x="600" y="246" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="30" font-weight="700" fill="#2d2821">1. Promise</text>
  <text x="600" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#4f473d">God's word says Christ saves</text>
  <text x="600" y="317" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#4f473d">all who come to Him.</text>

  <rect x="140" y="630" width="360" height="150" rx="24" fill="#e0efe8" stroke="#2d2821" stroke-width="5"/>
  <text x="320" y="676" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="30" font-weight="700" fill="#2d2821">2. Presence</text>
  <text x="320" y="715" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#3f4a43">The Spirit seals you and</text>
  <text x="320" y="747" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#3f4a43">teaches your heart to cry,</text>
  <text x="320" y="779" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#3f4a43">"Abba! Father!"</text>

  <rect x="700" y="630" width="360" height="150" rx="24" fill="#f2e8dc" stroke="#2d2821" stroke-width="5"/>
  <text x="880" y="676" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="30" font-weight="700" fill="#2d2821">3. Posture</text>
  <text x="880" y="715" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#4f473d">A new heart wants Jesus</text>
  <text x="880" y="747" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#4f473d">as Lord, fights sin,</text>
  <text x="880" y="779" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#4f473d">and keeps returning to Him.</text>
</svg>
